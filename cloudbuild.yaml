###############################################################
# STAVAGENT — Deploy ALL services (manual trigger only)
#
# Usage:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_TAG=$(git rev-parse --short HEAD) \
#     --region=europe-west3
#
# Or with force deploy (skip guard steps):
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_TAG=$(git rev-parse --short HEAD),_FORCE_DEPLOY=true \
#     --region=europe-west3
###############################################################
substitutions:
  _REGION: europe-west3
  _AR_REPO: stavagent
  _CLOUD_SQL_INSTANCE: stavagent-db
  _TAG: latest
  _FORCE_DEPLOY: 'true'

steps:
  # ─── concrete-agent ───────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-concrete
    args:
      - build
      - -f
      - concrete-agent/packages/core-backend/Dockerfile
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/concrete-agent:${_TAG}
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/concrete-agent:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push-concrete
    waitFor: [build-concrete]
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/concrete-agent
      - --all-tags

  - name: gcr.io/cloud-builders/gcloud
    id: deploy-concrete
    waitFor: [push-concrete]
    args:
      - run
      - deploy
      - concrete-agent
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/concrete-agent:${_TAG}
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8000
      - --add-cloudsql-instances=$PROJECT_ID:$_REGION:${_CLOUD_SQL_INSTANCE}
      - --set-env-vars=GEMINI_MODEL=gemini-2.5-flash,MULTI_ROLE_LLM=vertex-ai-gemini,VERTEX_LOCATION=europe-west3,GOOGLE_PROJECT_ID=$PROJECT_ID
      - --update-secrets=GOOGLE_API_KEY=GOOGLE_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,PERPLEXITY_API_KEY=PPLX_API_KEY:latest,DATABASE_URL=CONCRETE_DATABASE_URL:latest,SERVICE_TOKEN=SERVICE_TOKEN:latest

  # ─── stavagent-portal ─────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-portal
    args:
      - build
      - -f
      - stavagent-portal/Dockerfile
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/stavagent-portal-backend:${_TAG}
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/stavagent-portal-backend:latest
      - stavagent-portal

  - name: gcr.io/cloud-builders/docker
    id: push-portal
    waitFor: [build-portal]
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/stavagent-portal-backend
      - --all-tags

  - name: gcr.io/cloud-builders/gcloud
    id: deploy-portal
    waitFor: [push-portal]
    args:
      - run
      - deploy
      - stavagent-portal-backend
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/stavagent-portal-backend:${_TAG}
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=3001
      - --add-cloudsql-instances=$PROJECT_ID:$_REGION:${_CLOUD_SQL_INSTANCE}
      - --set-env-vars=DISABLE_AUTH=true
      - --update-secrets=DATABASE_URL=PORTAL_DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest

  # ─── monolit-planner ──────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-monolit
    args:
      - build
      - -f
      - Monolit-Planner/Dockerfile
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/monolit-planner-api:${_TAG}
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/monolit-planner-api:latest
      - Monolit-Planner

  - name: gcr.io/cloud-builders/docker
    id: push-monolit
    waitFor: [build-monolit]
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/monolit-planner-api
      - --all-tags

  - name: gcr.io/cloud-builders/gcloud
    id: deploy-monolit
    waitFor: [push-monolit]
    args:
      - run
      - deploy
      - monolit-planner-api
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/monolit-planner-api:${_TAG}
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=3001
      - --add-cloudsql-instances=$PROJECT_ID:$_REGION:${_CLOUD_SQL_INSTANCE}
      - --update-secrets=DATABASE_URL=MONOLIT_DATABASE_URL:latest
      - --set-env-vars=PORTAL_API_URL=https://stavagent-portal-backend-1086027517695.europe-west3.run.app,REGISTRY_API_URL=https://rozpocet-registry-backend-1086027517695.europe-west3.run.app

  # ─── urs-matcher-service ──────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-urs
    args:
      - build
      - -f
      - URS_MATCHER_SERVICE/Dockerfile.backend
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/urs-matcher-service:${_TAG}
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/urs-matcher-service:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push-urs
    waitFor: [build-urs]
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/urs-matcher-service
      - --all-tags

  - name: gcr.io/cloud-builders/gcloud
    id: deploy-urs
    waitFor: [push-urs]
    args:
      - run
      - deploy
      - urs-matcher-service
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/urs-matcher-service:${_TAG}
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=3001
      - --remove-env-vars=PPLX_API_KEY,ANTHROPIC_API_KEY,GOOGLE_AI_KEY,GOOGLE_API_KEY,OPENAI_API_KEY
      - --update-secrets=PPLX_API_KEY=PPLX_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,GOOGLE_API_KEY=GOOGLE_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest
      - --update-env-vars=GOOGLE_GENAI_USE_VERTEXAI=true,LLM_PROVIDER=gemini,GEMINI_MODEL=gemini-2.5-flash,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,VERTEX_LOCATION=europe-west3

  # ─── rozpocet-registry-backend ────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-registry
    args:
      - build
      - -f
      - rozpocet-registry-backend/Dockerfile
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/rozpocet-registry-backend:${_TAG}
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/rozpocet-registry-backend:latest
      - rozpocet-registry-backend

  - name: gcr.io/cloud-builders/docker
    id: push-registry
    waitFor: [build-registry]
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/rozpocet-registry-backend
      - --all-tags

  - name: gcr.io/cloud-builders/gcloud
    id: deploy-registry
    waitFor: [push-registry]
    args:
      - run
      - deploy
      - rozpocet-registry-backend
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/rozpocet-registry-backend:${_TAG}
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=3002
      - --add-cloudsql-instances=$PROJECT_ID:$_REGION:stavagent-db
      - --remove-env-vars=DATABASE_URL
      - --update-secrets=DATABASE_URL=REGISTRY_DATABASE_URL:latest

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/concrete-agent:${_TAG}
  - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/stavagent-portal-backend:${_TAG}
  - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/monolit-planner-api:${_TAG}
  - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/urs-matcher-service:${_TAG}
  - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/rozpocet-registry-backend:${_TAG}

timeout: 3600s
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
