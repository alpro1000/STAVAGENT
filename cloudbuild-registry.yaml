###############################################################
# rozpocet-registry-backend — triggered on changes in rozpocet-registry-backend/**
###############################################################
substitutions:
  _REGION: europe-west3
  _AR_REPO: stavagent

steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: guard
    entrypoint: bash
    args:
      - -c
      - |
        git fetch --depth=2 2>/dev/null || true
        CHANGED=$$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git show --name-only --format="" HEAD)
        echo "Changed files: $$CHANGED"
        if ! echo "$$CHANGED" | grep -q "^rozpocet-registry-backend/"; then
          echo "No changes in rozpocet-registry-backend/ — cancelling build"
          exit 1
        fi
        echo "Changes detected in rozpocet-registry-backend/ — proceeding"

  - name: gcr.io/cloud-builders/docker
    id: build-registry
    waitFor: [guard]
    args:
      - build
      - -f
      - rozpocet-registry-backend/Dockerfile
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/rozpocet-registry-backend:$SHORT_SHA
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/rozpocet-registry-backend:latest
      - rozpocet-registry-backend

  - name: gcr.io/cloud-builders/docker
    id: push-registry
    waitFor: [build-registry]
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/rozpocet-registry-backend
      - --all-tags

  - name: gcr.io/cloud-builders/gcloud
    id: deploy-registry
    waitFor: [push-registry]
    args:
      - run
      - deploy
      - rozpocet-registry-backend
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/rozpocet-registry-backend:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --add-cloudsql-instances=$PROJECT_ID:$_REGION:stavagent-db
      - --update-secrets=DATABASE_URL=REGISTRY_DATABASE_URL:latest

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/rozpocet-registry-backend:$SHORT_SHA

timeout: 600s
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
