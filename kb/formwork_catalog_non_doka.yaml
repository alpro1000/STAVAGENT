# Non-DOKA Formwork Catalog (PERI + ULMA + NOE + Místní)
# Sibling of kb/doka_frami_catalog.yaml. Together they are the single
# reviewable source for the formwork catalog:
#   formwork-systems.ts: FORMWORK_SYSTEMS = [...KB_DOKA, ...KB_NON_DOKA]
#
# Gate C (2026-06-17): verbatim lift of the previously-inline non-DOKA
# entries out of formwork-systems.ts into this YAML. Values are byte-identical
# and the list order is preserved, so engine output (and goldens) do NOT move.
# A 2025 price refresh from B3_current_prices/formwork_systems_peri.json is a
# separate, separately-reviewed gate.
#
# Edit values here and run `npm run gen:knowledge` to regenerate TS.

source_citation:
  source: "PERI catalog 2024/2025 + ULMA CZ 2024 + NOE-Schaltechnik 2024 + PERI offer DO-25-0056409 (D6 Karlovy Vary, 2025-03-30)"
