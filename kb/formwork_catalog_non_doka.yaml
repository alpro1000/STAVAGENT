    - "verbatim lift of non-DOKA entries from Monolit-Planner/shared/src/constants-data/formwork-systems.ts"
  notes: |
    Non-DOKA vendor formwork (PERI / ULMA / NOE / Místní). Composed AFTER the
    DOKA catalog in formwork-systems.ts; list order preserved verbatim from the
    previous inline hardcode so FORMWORK_SYSTEMS[0] (default) and any
    order-dependent selection stay unchanged. Price values are the 2024/2025
    hardcode as-was — refresh to 2025 B3 JSON is a separate gate.
  extraction_date: "2026-06-17"

