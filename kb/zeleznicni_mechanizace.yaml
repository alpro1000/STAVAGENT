# ── Čety a bezpečnostní role (TASK §3.8, Pattern 50) ────────────────────────
# Četa na trati je omezena KAPACITOU PRACOVNÍ FRONTY (délkou výlukového
# úseku), ne objemem prací. Osádka stroje je vázaná na stroj (výše).
# Bezpečnostní role jsou POVINNOU součástí osádky, ne režií.
track_gang:
  base_size: 8
  base_size_source: 'montéři tratí / traťoví dělníci — ORIENTAČNÍ výchozí četa; nahradit firemní normou'
  workspace_m_per_worker: 50
  workspace_source: 'Pattern 50 front-capacity — ORIENTAČNÍ kapacita fronty na pracovníka; kalibrovat golden objektem'
  confidence: 0.7

safety_roles:
  - { id: 'bezpecnostni_hlidka', name_cs: 'Bezpečnostní hlídka (hlásná služba)', count_per_gang: 1, mandatory: true }
  - { id: 'dozor_provozovatele', name_cs: 'Dozor / odpovědný zástupce (OZOV)', count_per_gang: 1, mandatory: true }
safety_roles_source:
  document: 'předpisy provozovatele dráhy pro práce za provozu — nenahráno; role povinné dle TASK §3.8'
  note: 'počty orientační; role se objevují v osádce, nikdy v režii'
