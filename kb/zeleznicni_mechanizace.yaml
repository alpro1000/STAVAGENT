# ============================================================================
# Kolejová mechanizace — single-source registr strojů (Zeleznice-Planner kiosk)
#
# TASK §3.7: výkon stroje NENÍ konstanta — závisí na režimu nasazení. Každý
# stroj: typy prací, výkonové normy PODLE REŽIMU, obsazení, omezení, ztrátové
# časy. AI odhad výkonu ZAKÁZÁN — chybějící hodnota = null (honest-blank,
# duration NEPOČÍTÁNO), dokud ji nedodá firemní norma nebo nahraný
# technologický list (S8/3 přílohy).
#
# Priorita zdrojů výkonů (TASK §3.7):
#   1. uživatelská norma firmy   0.99  (vstup user_machine_norms, ne YAML)
#   2. technologický list / S8/3 0.85
#   3. katalogový údaj           0.80  ← orientační hodnoty níže
#   4. AI odhad                  ZAKÁZÁNO
#
# rate.unit: 'm/h' (metr koleje za hodinu) | 'h/ks' (hodin na kus)
# Codegen: scripts/gen-knowledge.mjs →
#   Zeleznice-Planner/shared/src/kb-generated/zeleznice-mechanizace.ts
# ============================================================================

version: 1

source_citation:
  primary: >-
    Technologické listy strojů (přílohy předpisu S8/3) + katalogové listy
    provozovatelů kolejové mechanizace; řádové výkony převzaty z TASK §3.7
    tabulky jako ORIENTAČNÍ (confidence 0.80). První reálná příloha S8/3
    nahrána 2026-07-23: III/15 SVM 1000 CZ (confidence 0.85) — zdroj v KB
    `B9_Equipment_Specs/sz_s8_3_technologicke_listy/`.
  discipline: >-
    Chybějící výkon = null → engine vrací NEPOČÍTÁNO s důvodem, nikdy
    odhad. Uživatelská norma firmy má vždy přednost (0.99).

