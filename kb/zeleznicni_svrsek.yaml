# ============================================================================
# Železniční svršek — single-source KB data (Zeleznice-Planner kiosk)
#
# Pravidlo (docs/steering/structure.md §5): žádná normativní hodnota v kódu
# enginu. Vše zde, každý záznam se zdrojem. Codegen: scripts/gen-knowledge.mjs
# → Zeleznice-Planner/shared/src/kb-generated/zeleznice-svrsek.ts
#
# Priorita zdrojů (TASK Železniční svršek+spodek §3.7 / §6):
#   1. uživatelská norma firmy        confidence 0.99
#   2. předpis správce / tech. list   confidence 0.85
#   3. katalogový údaj                confidence 0.80
#   4. AI odhad                       ZAKÁZÁNO (honest-blank)
# Hodnota `null` = poctivé NEPOČÍTÁNO, dokud Alexander nenahraje zdroj
# (Příloha A tasku: S3 díly I–XVII, S3/2, S4, TKP kap. 8, ÚRS 824-1 přílohy).
# ============================================================================

version: 1

source_citation:
  primary: >-
    ÚRS ceník 824-1 Dráhy kolejové — příloha „Rozdělení pražců u normálně
    rozchodné koleje" (tabulka převzata z TASK_Zeleznicni_Svrsek_Spodek §3.3,
    2026-07; po nahrání ceníku do KB ověřit proti originálu).
  masses: >-
    ČSN EN 13674-1 (60E1, 49E1 jmenovité metrové hmotnosti);
    GOST 8161-75 / S3 díl IV (R 65).
  discipline: >-
    Hodnoty jsou DATA se zdrojem, nikdy konstanty v kódu. Orientační hodnoty
    jsou označeny v `note` a nesou confidence <= 0.80.

# ── Kolejnice (tvary) ───────────────────────────────────────────────────────
rail_profiles:
  - id: '60E1'
    name_cs: '60 E1 (UIC 60)'
    mass_kg_per_m: 60.21
    source: { document: 'ČSN EN 13674-1', note: 'jmenovitá metrová hmotnost' }
    confidence: 1.0
  - id: '49E1'
    name_cs: '49 E1 (S 49)'
    mass_kg_per_m: 49.39
    source: { document: 'ČSN EN 13674-1', note: 'jmenovitá metrová hmotnost' }
    confidence: 1.0
  - id: 'R65'
    name_cs: 'R 65'
    mass_kg_per_m: 64.72
    source: { document: 'GOST 8161-75 (přejímá S3 díl IV)', note: 'jmenovitá metrová hmotnost' }
    confidence: 0.85
  - id: 'T'
    name_cs: 'T (historický tvar ČSD)'
    mass_kg_per_m: null
    source:
      document: 'S3 díl IV — hodnota zatím nenahrána do KB'
      note: 'honest-blank: hmotnost tvaru T doplnit z předpisu S3; do té doby se hmotnost kolejnic NEPOČÍTÁ'
    confidence: 0

# ── Pražce ──────────────────────────────────────────────────────────────────
# count_mode: 'table'  = počet z tabulky rozdělení (spacing_table)
# count_mode: 'spacing' = počet z rozteče upevňovacích bodů (pražec tvaru Y —
#                         TASK §3.3: samostatný vzorec, ne položka téže tabulky)
sleeper_types:
  - id: 'betonovy_predpjaty'
    name_cs: 'Betonový předpjatý (typ B 91S apod.)'
    count_mode: 'table'
    mass_kg: 304
    mass_source: { document: 'katalog ŽPSV — orientační', note: 'B 91S; ověřit dle konkrétního typu' }
    fastening_nodes_per_sleeper: 2
    twin_at_joints: false
    confidence: 0.8
  - id: 'drevenny'
    name_cs: 'Dřevěný (buk/dub, impregnovaný)'
    count_mode: 'table'
    mass_kg: 85
    mass_source: { document: 'učební texty železniční svršek — orientační', note: 'ověřit dle dodavatele' }
    fastening_nodes_per_sleeper: 2
    # TASK §3.3: dvojčitý dřevěný pražec u stykované koleje se počítá jako DVA
    twin_at_joints: true
    confidence: 0.8
  - id: 'ocelovy_Y'
    name_cs: 'Ocelový tvaru Y'
    count_mode: 'spacing'
    default_spacing_m: 0.60
    spacing_source:
      document: 'katalogový list výrobce Y pražců — orientační'
      note: 'rozteč upevňovacích bodů; MUSÍ být potvrzena projektem, jinak jen orientační'
    mass_kg: 130
    mass_source: { document: 'katalogový list výrobce — orientační', note: null }
    fastening_nodes_per_sleeper: 3
    twin_at_joints: false
    confidence: 0.7
  - id: 'plastovy'
    name_cs: 'Plastový (kompozitní)'
    count_mode: 'table'
    mass_kg: null
    mass_source: { document: 'katalog výrobce — nenahráno do KB', note: 'honest-blank' }
    fastening_nodes_per_sleeper: 2
    twin_at_joints: false
    confidence: 0

# ── Upevnění ────────────────────────────────────────────────────────────────
# komplet = 1 upevňovací uzel (1 kolejnice × 1 pražec); počet kompletů =
# počet pražců × fastening_nodes_per_sleeper (TASK §3.4)
fastening_systems:
  - id: 'bezpodkladnicove_pruzne'
    name_cs: 'Pružné bezpodkladnicové (typ W 14 / Vossloh Skl 14 apod.)'
    kind: 'bezpodkladnicove'
    components_per_node:
      - { name_cs: 'pružná svěrka', qty: 2 }
      - { name_cs: 'úhlová vodicí vložka', qty: 2 }
      - { name_cs: 'vrtule', qty: 2 }
      - { name_cs: 'plastová hmoždinka', qty: 2 }
      - { name_cs: 'pryžová podložka pod patu kolejnice', qty: 1 }
    source: { document: 'katalog výrobce upevnění — orientační složení kompletu', note: 'ověřit dle sestavy svršku a S3 dílu VI' }
    confidence: 0.8
  - id: 'podkladnicove_tuhe'
    name_cs: 'Podkladnicové (žebrová podkladnice + svěrky)'
    kind: 'podkladnicove'
    components_per_node:
      - { name_cs: 'žebrová podkladnice', qty: 1 }
      - { name_cs: 'svěrka', qty: 2 }
      - { name_cs: 'svěrkový šroub s maticí', qty: 2 }
      - { name_cs: 'vrtule', qty: 4 }
      - { name_cs: 'podložka pod podkladnici', qty: 1 }
    source: { document: 'S3 díl VI — orientační složení, nenahráno; katalogová praxe', note: 'ověřit dle sestavy' }
    confidence: 0.8

# ── Rozdělení pražců (klíčová deterministická tabulka, TASK §3.3) ───────────
# (kód rozdělení, délka pole) → ks/pole a ks/km. U stykované koleje je počet
# průměr včetně zhuštění u styků, ne rozteč.
spacing_table:
  - { code: 'b', field_length_m: 25, sleepers_per_field: 34, sleepers_per_km: 1360 }
  - { code: 'c', field_length_m: 25, sleepers_per_field: 38, sleepers_per_km: 1520 }
  - { code: 'd', field_length_m: 25, sleepers_per_field: 41, sleepers_per_km: 1640 }
  - { code: 'e', field_length_m: 25, sleepers_per_field: 46, sleepers_per_km: 1840 }
  - { code: 'u', field_length_m: 25, sleepers_per_field: 42, sleepers_per_km: 1680 }
  - { code: 'u', field_length_m: 20, sleepers_per_field: 34, sleepers_per_km: 1700 }
spacing_table_source:
  document: 'ÚRS ceník 824-1 Dráhy kolejové — příloha „Rozdělení pražců"'
  note: 'reprodukce z TASK §3.3; golden test tabulku pinuje 1:1'
spacing_table_confidence: 0.85

