# ── Kolejové lože (TASK §3.4: objem VŽDY z příčného profilu, nikdy paušál) ──
ballast:
  fraction_default: '31,5/63'
  fraction_source:
    document: 'TKP staveb státních drah — kapitola pro kolejové lože (nenahráno)'
    note: 'frakce a třída kameniva dle projektu; default jen informativní'
  # A = crown_width × t + slope_ratio × t²  (lichoběžník, obě svahové výseče)
  # V = A × délka trati × počet kolejí (preset je JEDNOkolejný profil;
  #     mezikolejní prostor vícekolejné trati NENÍ modelován — warning)
  profile_presets:
    - id: 'jednokolejna_bezstykova'
      name_cs: 'Jednokolejná, bezstyková kolej — vzorový profil (orientační)'
      thickness_under_sleeper_m: 0.35
      crown_width_m: 3.40
      slope_ratio: 1.25
      source:
        document: 'vzorové listy železničního spodku (řada Ž) — orientační hodnoty, nenahráno'
        note: 'tloušťka se měří od ložné plochy pražce po pláň tělesa železničního spodku; preset MUSÍ potvrdit uživatel'
      confidence: 0.8
    - id: 'jednokolejna_stykovana'
      name_cs: 'Jednokolejná, stykovaná kolej — vzorový profil (orientační)'
      thickness_under_sleeper_m: 0.30
      crown_width_m: 3.20
      slope_ratio: 1.25
      source:
        document: 'vzorové listy železničního spodku (řada Ž) — orientační hodnoty, nenahráno'
        note: 'preset MUSÍ potvrdit uživatel'
      confidence: 0.8

# ── Bezstyková kolej (TASK §3.5) ────────────────────────────────────────────
bk:
  rail_delivery_lengths_m: [25, 75, 120]
  default_rail_delivery_length_m: 75
  delivery_source:
    document: 'technické podmínky dodací kolejnic (výrobce) — obvyklé dodávané délky, orientační'
    note: 'skutečná dodávaná délka dle zakázky'
  zaverne_svary_per_ras_end: 1     # závěrný svar na každém konci každého pásu
  upinaci_teplota_c:
    min: 17
    max: 23
    source: { document: 'předpis S3/2 Bezstyková kolej — orientační rozsah upínací teploty', note: 'rozhodná hodnota dle předpisu a projektu; mimo rozsah = napínání/ohřev (samostatná práce)' }
    confidence: 0.8

# ── Technologická posloupnost — parametry (TASK §3.9) ───────────────────────
technology:
  # počet podbití není konstanta — závisí na druhu stavby
  tamping_passes_by_project_kind:
    novostavba: 2
    rekonstrukce: 2
    udrzba: 1
  dynamic_stabilization_by_project_kind:
    novostavba: true
    rekonstrukce: true
    udrzba: false
  source:
    document: 'TASK §3.9 (doménová pravidla posloupnosti); S3/1 — nenahráno'
    note: 'po nahrání S3/1 zpřesnit dle rozsahu prací'
  confidence: 0.8
