# Source: ČSN EN 13670 Table NA.2 + TKP18 §7.8.3 (mosty)
# Extracted: concrete-agent/.../B2_csn_standards/tkp/tkp_18_betonove_mosty.json
#            + verbatim from Monolit-Planner/shared/src/calculators/maturity.ts:168-203
# Used by: maturity.ts → calculateCuring()
#
# Edit values here and run `npm run gen:knowledge` to regenerate TS.

source_citation:
  norm: "ČSN EN 13670 Table NA.2 + TKP18 §7.8.3"
  also_see: "ČSN EN 206+A2, ČSN 73 6244"
  pdf_reference: "https://pjpk.rsd.cz/data/USR_001_2_8_TKP/TKP_18_06_2025.pdf"
  extracted_from:
    - "concrete-agent/packages/core-backend/app/knowledge_base/B2_csn_standards/tkp/tkp_18_betonove_mosty.json"
    - "Monolit-Planner/shared/src/calculators/maturity.ts (CURING_DAYS_TABLE constant)"
  extraction_date: "2026-05-26"

# ─── CURING_DAYS_TABLE — per temperature × class group × curing class ──
# Curing classes (TKP18):
#   2 = standard (foundations, lean concrete, building elements)
#   3 = substructure (abutments, piers, pier foundations)
#   4 = superstructure (bridge deck, cornices) — most demanding
# Values are for CEM I, horizontal elements (slab/beam).
# Vertical elements (wall/column) get ×0.7 adjustment in engine.

curing_days_table:
  - temp_min: -5
    temp_max: 5
    description: "t < 5°C — very slow hydration"
    days:
      "C12-C16": { "2": 7,   "3": 12,  "4": 22 }
      "C20-C25": { "2": 5,   "3": 9,   "4": 18 }
      "C30+":    { "2": 4,   "3": 7,   "4": 30 }
  - temp_min: 5
    temp_max: 10
    description: "5°C ≤ t < 10°C"
    days:
      "C12-C16": { "2": 5,   "3": 9,   "4": 18 }
      "C20-C25": { "2": 4,   "3": 7,   "4": 13 }
      "C30+":    { "2": 3,   "3": 5,   "4": 18 }
  - temp_min: 10
    temp_max: 15
    description: "10°C ≤ t < 15°C"
    days:
      "C12-C16": { "2": 4,   "3": 7,   "4": 13 }
      "C20-C25": { "2": 3,   "3": 5,   "4": 9 }
      "C30+":    { "2": 2,   "3": 4,   "4": 13 }
  - temp_min: 15
    temp_max: 25
    description: "15°C ≤ t < 25°C — optimal range"
    days:
      "C12-C16": { "2": 3,   "3": 5,   "4": 10 }
      "C20-C25": { "2": 2,   "3": 4,   "4": 9 }
      "C30+":    { "2": 1.5, "3": 2.5, "4": 9 }
  - temp_min: 25
    temp_max: 50
    description: "t ≥ 25°C — fast but mandatory wet curing"
    days:
      "C12-C16": { "2": 2,   "3": 3.5, "4": 7 }
      "C20-C25": { "2": 1.5, "3": 2.5, "4": 5 }
      "C30+":    { "2": 1,   "3": 1.5, "4": 5 }

# ─── TKP18 §7.8.3 exposure-class minimums (hard floors) ──────────────────
# Independent of concrete class, temperature, or cement type.
# Freeze-thaw + chloride/chemical attack drive minimum surface curing.

exposure_min_curing_days:
  # XF — freeze-thaw
  XF1: 5    # moderate saturation, no de-icing
  XF2: 5    # moderate saturation + de-icing
  XF3: 7    # high saturation, no de-icing
  XF4: 7    # high saturation + de-icing (bridge decks, curbs)
  # XD — chlorides non-marine
  XD2: 5
  XD3: 7
  # XS — chlorides marine
  XS2: 5
  XS3: 7
  # XA — chemical attack
  XA2: 5
  XA3: 7

# ─── Absolute minima ────────────────────────────────────────────────────

tkp18_absolute_min_days: 5  # TKP18 absolute min for PK bridge (any element)

# §7.8.3.4 ZDS (zvláštní druh stavebních) exception
zds_exception:
  default_days: 5
  xf3_xf4_days: 7
  description: "ZDS exception — default 5d, raise to 7d pro XF3/XF4"
  temperature_kropit_range_c: [5, 20]
  temperature_no_kropit_below_c: 5

# ─── Cement type speed factor (relative to CEM I = 1.0) ─────────────────

cement_speed:
  CEM_I: 1.0     # OPC — fast early strength
  CEM_II: 0.85   # blended — moderate
  CEM_III: 0.6   # slag — slow early strength (~40% slower)

# ─── Nurse-Saul datum ───────────────────────────────────────────────────

t_datum: -10  # °C — standard for OPC

# ─── Default curing class per element type (TKP18 §7.8.3) ──────────────
# 4 = superstructure (NK)
# 3 = substructure
# 2 = foundations, lean concrete, building elements, transition slabs (default)

default_curing_class_by_element:
  # Class 4 — superstructure
  mostovkova_deska: 4
  rimsa: 4
  rigel: 4
  # Class 3 — substructure
  opery_ulozne_prahy: 3
  driky_piliru: 3
  zaklady_piliru: 3
  kridla_opery: 3
  mostni_zavirne_zidky: 3
  podlozkovy_blok: 3
  operne_zdi: 3
  # Class 2 fallback applied for: pilota, podkladni_beton, prechodova_deska,
  # and all building elements (stropni_deska, stena, sloup, zakladovy_pas,
  # zakladova_patka, zakladova_deska, pruvlak, nadrz, podzemni_stena,
  # schodiste, zaklady_oper, sloup)
