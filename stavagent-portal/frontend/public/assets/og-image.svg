<?xml version="1.0" encoding="UTF-8"?>
<!--
  Source-of-truth SVG for the og:image (Open Graph / Twitter card preview)
  used on social-share previews of www.stavagent.cz.

  Spec: 1200×630 (Open Graph standard 1.91:1 ratio, recommended by Facebook,
  LinkedIn, Twitter/X). Text-only fallback per v3.2 task Q-G — favors a
  clean wordmark + H1 + trust badges over a half-baked product mockup.

  Build: cairosvg og-image.svg -o og-image.png -W 1200 -H 630
  Resulting PNG must stay under 300 KB and match the dimensions exactly.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="630"
     viewBox="0 0 1200 630"
     font-family="DM Sans, Inter, Arial, Helvetica, sans-serif">

  <!-- Background -->
  <rect width="1200" height="630" fill="#F5F3F0"/>

  <!-- Subtle concrete grid (very low opacity diagonal lines for texture) -->
  <defs>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CFD1D3" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- ── Top zone: logo + wordmark ───────────────────────────────────── -->
  <!-- Logo: simplified StavAgent "S" mark in concrete + orange accent -->
  <g transform="translate(80, 80)">
    <circle cx="40" cy="40" r="38" fill="#CFD1D3" stroke="#A8AAAC" stroke-width="1.5"/>
    <rect x="22" y="20"  width="36" height="9"  fill="#5A5D60" rx="1"/>
    <rect x="22" y="20"  width="9"  height="20" fill="#6B6E71" rx="1"/>
    <rect x="22" y="32"  width="36" height="9"  fill="#FF9F1C" rx="1"/>
    <rect x="49" y="40"  width="9"  height="20" fill="#6B6E71" rx="1"/>
    <rect x="22" y="52"  width="36" height="9"  fill="#5A5D60" rx="1"/>
  </g>

  <text x="180" y="120" font-size="40" font-weight="700" fill="#1a1a1a"
        letter-spacing="-0.5">StavAgent</text>
  <text x="180" y="148" font-size="16" font-weight="500" fill="#6b7280">
    Pro rozpočtáře a přípraváře monolitů
  </text>

  <!-- ── Hero zone: H1 ────────────────────────────────────────────────── -->
  <!-- Czech version of the v3.2 H1 (Q-B answer A): "Z rozpočtu pracovní plán."
       'pracovní plán' rendered in accent orange to anchor product framing. -->
  <text x="80" y="320" font-size="84" font-weight="700" fill="#1a1a1a"
        letter-spacing="-2">Z rozpočtu</text>
  <text x="80" y="420" font-size="84" font-weight="700" fill="#FF9F1C"
        letter-spacing="-2">pracovní plán.</text>

  <!-- Sub-tagline -->
  <text x="80" y="470" font-size="22" font-weight="400" fill="#374151">
    Klasifikace pozic, TOV, takty, zdroje, harmonogram — v jedné tabulce.
  </text>

  <!-- ── Bottom zone: 3 trust badges ─────────────────────────────────── -->
  <!-- Each badge = small dot + label. Single horizontal row at y=560. -->
  <g transform="translate(80, 540)">
    <!-- Badge 1: OTSKP -->
    <circle cx="10" cy="20" r="6" fill="#FF9F1C"/>
    <text x="28" y="26" font-size="18" font-weight="600" fill="#1a1a1a">17 904 položek OTSKP</text>

    <!-- Badge 2: Norms -->
    <circle cx="320" cy="20" r="6" fill="#FF9F1C"/>
    <text x="338" y="26" font-size="18" font-weight="600" fill="#1a1a1a">ČSN EN 13670 · DIN 18218</text>

    <!-- Badge 3: Free start -->
    <circle cx="700" cy="20" r="6" fill="#FF9F1C"/>
    <text x="718" y="26" font-size="18" font-weight="600" fill="#1a1a1a">200 kreditů zdarma</text>
  </g>

  <!-- ── Domain pin (bottom-right corner) ────────────────────────────── -->
  <text x="1120" y="595" font-size="14" font-weight="500" fill="#6b7280"
        text-anchor="end">www.stavagent.cz</text>
</svg>
