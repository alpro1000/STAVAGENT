###############################################################
# urs-matcher-service — triggered only on changes in URS_MATCHER_SERVICE/**
###############################################################
substitutions:
  _REGION: europe-west3

steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: guard
    entrypoint: bash
    args:
      - -c
      - |
        git fetch --depth=2 2>/dev/null || true
        CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git show --name-only --format="" HEAD)
        echo "Changed files: $$CHANGED"
        if ! echo "$$CHANGED" | grep -q "^URS_MATCHER_SERVICE/"; then
          echo "No changes in URS_MATCHER_SERVICE/ — cancelling build"
          exit 1
        fi
        echo "Changes detected in URS_MATCHER_SERVICE/ — proceeding"

  - name: gcr.io/cloud-builders/docker
    id: build-urs
    waitFor: [guard]
    args:
      - build
      - -f
      - URS_MATCHER_SERVICE/Dockerfile.backend
      - -t
      - gcr.io/$PROJECT_ID/urs-matcher-service:$SHORT_SHA
      - -t
      - gcr.io/$PROJECT_ID/urs-matcher-service:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push-urs
    waitFor: [build-urs]
    args: [push, gcr.io/$PROJECT_ID/urs-matcher-service, --all-tags]

  - name: gcr.io/cloud-builders/gcloud
    id: deploy-urs
    waitFor: [push-urs]
    args:
      - run
      - deploy
      - urs-matcher-service
      - --image=gcr.io/$PROJECT_ID/urs-matcher-service:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated

images:
  - gcr.io/$PROJECT_ID/urs-matcher-service:$SHORT_SHA

timeout: 600s
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
