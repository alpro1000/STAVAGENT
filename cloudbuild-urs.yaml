steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: guard
    entrypoint: bash
    args:
      - -c
      - |
        git fetch --depth=2 2>/dev/null || true
        CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git show --name-only --format="" HEAD)
        echo "Changed files: $CHANGED"
        if ! echo "$CHANGED" | grep -q "^URS_MATCHER_SERVICE/"; then
          echo "No changes in URS_MATCHER_SERVICE/ — cancelling build"
          exit 1
        fi
        echo "Changes detected in URS_MATCHER_SERVICE/ — proceeding"

  - name: gcr.io/cloud-builders/docker
    id: build-urs
    args:
      - build
      - -t
      - europe-west3-docker.pkg.dev/project-947a512a-481d-49b5-81c/stavagent-repo/urs-matcher-backend:$SHORT_SHA
      - -t
      - europe-west3-docker.pkg.dev/project-947a512a-481d-49b5-81c/stavagent-repo/urs-matcher-backend:latest
      - URS_MATCHER_SERVICE

  - name: gcr.io/cloud-builders/docker
    id: push-urs
    args:
      - push
      - europe-west3-docker.pkg.dev/project-947a512a-481d-49b5-81c/stavagent-repo/urs-matcher-backend
      - --all-tags

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-urs
    args:
      - run
      - deploy
      - urs-matcher-backend
      - --image=europe-west3-docker.pkg.dev/project-947a512a-481d-49b5-81c/stavagent-repo/urs-matcher-backend:$SHORT_SHA
      - --region=europe-west3
      - --platform=managed
      - --allow-unauthenticated
