###############################################################
# stavagent-portal — triggered only on changes in stavagent-portal/**
###############################################################
substitutions:
  _REGION: europe-west3

steps:
  - name: gcr.io/cloud-builders/docker
    id: build-portal
    args:
      - build
      - -f
      - stavagent-portal/Dockerfile
      - -t
      - gcr.io/$PROJECT_ID/stavagent-portal-backend:$SHORT_SHA
      - -t
      - gcr.io/$PROJECT_ID/stavagent-portal-backend:latest
      - stavagent-portal

  - name: gcr.io/cloud-builders/docker
    id: push-portal
    waitFor: [build-portal]
    args: [push, gcr.io/$PROJECT_ID/stavagent-portal-backend, --all-tags]

  - name: gcr.io/cloud-builders/gcloud
    id: deploy-portal
    waitFor: [push-portal]
    args:
      - run
      - deploy
      - stavagent-portal-backend
      - --image=gcr.io/$PROJECT_ID/stavagent-portal-backend:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated

images:
  - gcr.io/$PROJECT_ID/stavagent-portal-backend:$SHORT_SHA

timeout: 600s
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
