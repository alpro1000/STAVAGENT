###############################################################
# stavagent-portal — triggered only on changes in stavagent-portal/**
###############################################################
substitutions:
  _REGION: europe-west3

steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: guard
    entrypoint: bash
    args:
      - -c
      - |
        git fetch --depth=2 2>/dev/null || true
        CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git show --name-only --format="" HEAD)
        echo "Changed files: $$CHANGED"
        if ! echo "$$CHANGED" | grep -q "^stavagent-portal/"; then
          echo "No changes in stavagent-portal/ — cancelling build"
          gcloud builds cancel $$BUILD_ID --project=$$PROJECT_ID --quiet 2>/dev/null || true
          sleep 20
          exit 0
        fi
        echo "Changes detected in stavagent-portal/ — proceeding"

  - name: gcr.io/cloud-builders/docker
    id: build-portal
    waitFor: [guard]
    args:
      - build
      - -f
      - stavagent-portal/Dockerfile
      - -t
      - gcr.io/$PROJECT_ID/stavagent-portal-backend:$SHORT_SHA
      - -t
      - gcr.io/$PROJECT_ID/stavagent-portal-backend:latest
      - stavagent-portal

  - name: gcr.io/cloud-builders/docker
    id: push-portal
    waitFor: [build-portal]
    args: [push, gcr.io/$PROJECT_ID/stavagent-portal-backend, --all-tags]

  - name: gcr.io/cloud-builders/gcloud
    id: deploy-portal
    waitFor: [push-portal]
    args:
      - run
      - deploy
      - stavagent-portal-backend
      - --image=gcr.io/$PROJECT_ID/stavagent-portal-backend:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated

images:
  - gcr.io/$PROJECT_ID/stavagent-portal-backend:$SHORT_SHA

timeout: 600s
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
