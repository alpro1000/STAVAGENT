name: deploy-all
description: "Manual trigger to deploy ALL services"
# location задаётся флагом --region при `gcloud builds triggers import` — поле в yaml import НЕ принимает (.location: unused, инцидент 2026-06-11)
github:
  owner: alpro1000
  name: STAVAGENT
  push:
    branch: "^$"
filename: cloudbuild.yaml
substitutions:
  _REGION: europe-west3
  _TAG: $SHORT_SHA
  _FORCE_DEPLOY: "true"
# serviceAccount НЕ указывать: явный легаси-SA (…@cloudbuild.gserviceaccount.com) отвергается валидацией Cloud Build («provide a user-managed service account or leave unset»). Unset → дефолтный выбор SA, проверено билдами до 2026-06-11. Инцидент №2 runbook.

approvalConfig:
  approvalRequired: true
