###############################################################
# mineru-service — standalone MinerU PDF parser
# Triggered ONLY on changes in mineru_service/**
###############################################################

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-mineru'
    args:
      - 'build'
      - '-t'
      - 'europe-west3-docker.pkg.dev/$PROJECT_ID/stavagent/mineru-service:$COMMIT_SHA'
      - '-t'
      - 'europe-west3-docker.pkg.dev/$PROJECT_ID/stavagent/mineru-service:latest'
      - '-f'
      - 'mineru_service/Dockerfile'
      - 'mineru_service/'
    timeout: '3600s'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-mineru'
    waitFor: ['build-mineru']
    args:
      - 'push'
      - '--all-tags'
      - 'europe-west3-docker.pkg.dev/$PROJECT_ID/stavagent/mineru-service'

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-mineru'
    waitFor: ['push-mineru']
    args:
      - 'run'
      - 'deploy'
      - 'mineru-service'
      - '--image'
      - 'europe-west3-docker.pkg.dev/$PROJECT_ID/stavagent/mineru-service:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--memory'
      - '4Gi'
      - '--cpu'
      - '2'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '2'
      - '--timeout'
      - '200'
      - '--concurrency'
      - '1'
      - '--no-allow-unauthenticated'

timeout: 3900s

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
