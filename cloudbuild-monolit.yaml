steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: guard
    entrypoint: bash
    args:
      - -c
      - |
        git fetch --depth=2 2>/dev/null || true
        CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git show --name-only --format="" HEAD)
        echo "Changed files: $CHANGED"
        if ! echo "$CHANGED" | grep -q "^Monolit-Planner/"; then
          echo "No changes in Monolit-Planner/ — cancelling build"
          exit 1
        fi
        echo "Changes detected in Monolit-Planner/ — proceeding"

  - name: gcr.io/cloud-builders/docker
    id: build-monolit
    args:
      - build
      - -t
      - europe-west3-docker.pkg.dev/project-947a512a-481d-49b5-81c/stavagent-repo/monolit-planner-backend:$SHORT_SHA
      - -t
      - europe-west3-docker.pkg.dev/project-947a512a-481d-49b5-81c/stavagent-repo/monolit-planner-backend:latest
      - Monolit-Planner

  - name: gcr.io/cloud-builders/docker
    id: push-monolit
    args:
      - push
      - europe-west3-docker.pkg.dev/project-947a512a-481d-49b5-81c/stavagent-repo/monolit-planner-backend
      - --all-tags

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-monolit
    args:
      - run
      - deploy
      - monolit-planner-backend
      - --image=europe-west3-docker.pkg.dev/project-947a512a-481d-49b5-81c/stavagent-repo/monolit-planner-backend:$SHORT_SHA
      - --region=europe-west3
      - --platform=managed
      - --allow-unauthenticated
      - --update-secrets=DATABASE_URL=DATABASE_URL:latest,GOOGLE_AI_KEY=GOOGLE_AI_KEY:latest
