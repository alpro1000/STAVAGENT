###############################################################
# monolit-planner-api — triggered only on changes in Monolit-Planner/**
###############################################################
substitutions:
  _REGION: europe-west3
  _AR_REPO: stavagent
  _CLOUD_SQL_INSTANCE: stavagent-db
  _TAG: latest
  _FORCE_DEPLOY: 'false'

steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: guard
    entrypoint: bash
    args:
      - -c
      - |
        if [ "${_FORCE_DEPLOY}" = "true" ]; then
          echo "Force deploy requested — skipping guard"
          exit 0
        fi
        if ! git rev-parse --git-dir >/dev/null 2>&1; then
          echo "No git repo (manual submit) — skipping guard"
          exit 0
        fi
        git fetch --depth=2 2>/dev/null || true
        CHANGED=$$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git show --name-only --format="" HEAD)
        echo "Changed files: $$CHANGED"
        if ! echo "$$CHANGED" | grep -q "^Monolit-Planner/"; then
          echo "No changes in Monolit-Planner/ — cancelling build"
          exit 1
        fi
        echo "Changes detected in Monolit-Planner/ — proceeding"

  - name: gcr.io/cloud-builders/docker
    id: build-monolit
    waitFor: [guard]
    args:
      - build
      - -f
      - Monolit-Planner/Dockerfile
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/monolit-planner-api:${_TAG}
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/monolit-planner-api:latest
      - Monolit-Planner

  - name: gcr.io/cloud-builders/docker
    id: push-monolit
    waitFor: [build-monolit]
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/monolit-planner-api
      - --all-tags

  # Note: DB migrations run automatically on server startup via
  # initDatabase() → runPhase7PortalIntegration() in migrations.js.
  # No separate Cloud Build migration step needed.

  - name: gcr.io/cloud-builders/gcloud
    id: deploy-monolit
    waitFor: [push-monolit]
    args:
      - run
      - deploy
      - monolit-planner-api
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/monolit-planner-api:${_TAG}
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=3001
      - --add-cloudsql-instances=$PROJECT_ID:$_REGION:${_CLOUD_SQL_INSTANCE}
      - --update-secrets=DATABASE_URL=MONOLIT_DATABASE_URL:latest
      - --set-env-vars=PORTAL_API_URL=https://stavagent-portal-backend-1086027517695.europe-west3.run.app,REGISTRY_API_URL=https://rozpocet-registry-backend-1086027517695.europe-west3.run.app

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/monolit-planner-api:${_TAG}

timeout: 1200s
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
