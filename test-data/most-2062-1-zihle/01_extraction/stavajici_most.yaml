    value_approx: 9.0
    source: "mostní list (PNG, kóta '900' v půdorysu mezi opěrami)"
    confidence: 0.7
    note: "Hodnota 9.00 m = osová vzdálenost mezi opěrami (rozpětí). Šikmost 50° → efektivní délka trámů > 9.0 m. Geodetické zaměření vyžadováno pro přesné hodnoty."
  sirka_vozovky_mostu_m:
    value_approx: 9.00
    source: "mostní list (PNG, řez A-A' kóta '900')"
    confidence: 0.7
    note: "Stávající mostovka má vozovku ~9.0 m mezi římsami. ZD §4.4.c požaduje pro nový most pouze S 7,5 (vozovka 6.50 m) — tj. nová NK bude užší."
  sirka_celkova_m:
    value_approx: 9.40
    source: "mostní list (řez A-A': 20 + 900 + 20 = 940 mm? cm? — interpretace 20 cm římsa každé straně)"
    confidence: 0.6
    note: "Interpretace '20 cm každé strany na římsy' → 9.00 + 0.20 + 0.20 = 9.40 m celková šířka. Kóty rukopisné, hodnoty mohou být jiné jednotky."
  zabradli_delka_leve_m:
    value: 7.40
    source: "mostní list (PNG, label 'ZÁBRADLÍ 7,40 BM')"
    confidence: 0.9
  zabradli_delka_prave_m:
    value: 8.30
    source: "mostní list (PNG, label 'ZÁBRADLÍ 8,30 BM')"
    confidence: 0.9
    note: "Asymetrie 7.40 vs 8.30 m vyplývá ze šikmosti 50° + rozevírání trámů na pravé straně"
  svetla_vyska_pod_mostem_m:
    value: null
    source: null
    confidence: null
    note: "v HPM ani mostním listu kvantitativně neuvedena. HPM s.4 [2.1] kvalifikuje: 'střední část konstrukce lze jen obtížně kontrolovat pro malou světlou výšku pod mostem' a HPM s.4 [4.2]: 'Prostor pod mostem je příliš nízký pro veškeré revizní i stavební práce'. Foto 20260421_131615 + 131624 vizuálně potvrzují velmi nízkou světlost (odhad ~1.0–1.5 m) — flag jako MISSING quantitative."

