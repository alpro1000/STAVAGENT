# ─────────────────────────────────────────────────────────────────────
# § 1. TKP kapitoly aplikovatelné na Žihle (vzor: Kfely TKP A05)
# ─────────────────────────────────────────────────────────────────────
# Pozn.: Kfely má 14 TKP kapitol (1, 2, 3, 4, 5, 7, 11, 16, 18, 21, 22, 23, 26, 31).
#        Pro Žihle vyloučit kap. 22 (mostní ložiska — ZD §4.4.l zakazuje ložiska).
#        Ostatní kapitoly aplikovatelné téměř identicky (silniční mosty kategorie III).
# ─────────────────────────────────────────────────────────────────────

tkp_kapitoly:
  - kap: "1"
    nazev: "Všeobecně"
    relevance_zihle: true
    kb_status: "missing — TKP1 v KB B2_csn_standards/tkp/ neexistuje"
    odkaz: "MD ČR — Technické kvalitativní podmínky staveb pozemních komunikací"

  - kap: "2"
    nazev: "Příprava staveniště"
    relevance_zihle: true
    odkaz_zd: "souvisí se ZD §4.3.e — provizorium + dopravní opatření"
    kb_status: "missing"

  - kap: "3"
    nazev: "Zemní práce"
    relevance_zihle: true
    odkaz_zd: "ZD §4.4.a (založení), §4.4.n (sanace podloží směrové úpravy)"
    kb_status: "PRESENT — B2_csn_standards/tkp/tkp_03_zemni_prace.json"
    aplikace_zihle: ["plošné založení (předp.)", "demolice opěr", "úprava koryta ±10m"]

  - kap: "4"
    nazev: "Pilotové základy"
    relevance_zihle: "podmíněně"
    poznamka: "Pokud IGP ukáže nutnost. HPM s.2 [1.1] uvádí 'pravděpodobně plošné' založení stávajícího mostu — pro nový by stačily plošné při dobrém podloží."
    kb_status: "missing"

  - kap: "5"
    nazev: "Podkladní vrstvy vozovky"
    relevance_zihle: true
    odkaz_zd: "ZD §4.4.j (vozovka 3-vrstvá živičná)"
    kb_status: "missing"

  - kap: "7"
    nazev: "Hutněné asfaltové vrstvy"
    relevance_zihle: true
    odkaz_zd: "ZD §4.4.j + obrusná vrstva 100 % bez tolerance"
    kb_status: "missing"

  - kap: "11"
    nazev: "Svodidla, zábradlí, tlumiče nárazu"
    relevance_zihle: true
    odkaz_zd: "ZD §4.4.i (zádržný systém pro extravilán); HPM eviduje SafeStar 231 H2/W3"
    csn_souvisejici: "ČSN EN 1317"
    kb_status: "missing"

  - kap: "16"
    nazev: "Piloty + podzemní stěny"
    relevance_zihle: "podmíněně (pokud IGP)"
    kb_status: "missing"

  - kap: "18"
    nazev: "Betonové konstrukce a mosty"
    relevance_zihle: true
    odkaz_zd: "ZD §4.4 — celý nový most je betonová konstrukce"
    kb_status: "PRESENT — B2_csn_standards/tkp/tkp_18.md + tkp_18_betonove_mosty.json"
    aplikace_zihle:
      - "§7.8 ošetřování betonu (zrání)"
      - "§7.8.3 třídy ošetřování (klíčové pro mostovku)"
      - "krytí výztuže"
      - "betonování (záběry, pracovní spáry)"

  - kap: "21"
    nazev: "Zvláštní zakládání"
    relevance_zihle: "podmíněně"
    kb_status: "PRESENT — B2_csn_standards/tkp/tkp_24_zvlastni_zakladani.json (číslo kap. 24 v KB, ale TKP kap. 21)"
    poznamka_kb: "číslování v KB neodpovídá MD ČR — nutno ověřit"

  - kap: "22"
    nazev: "Mostní ložiska"
    relevance_zihle: false
    duvod_vylouceni: "ZD §4.4.l explicitně zakazuje mostní ložiska. Integrální rám = bez ložisek."
    kb_status: "missing"

  - kap: "23"
    nazev: "Mostní závěry"
    relevance_zihle: false
    duvod_vylouceni: "ZD §4.4.l explicitně zakazuje dilatační závěry. Integrální rám = bez dilatačních závěrů."
    kb_status: "missing"

  - kap: "26"
    nazev: "Izolace + povlaky"
    relevance_zihle: true
    odkaz_zd: "vodotěsná izolace mostovky pod živičnou vozovkou"
    kb_status: "PRESENT — B2_csn_standards/tkp/tkp_22_izolace.json (číslo kap. 22 v KB, ale TKP kap. 26)"
    poznamka_kb: "číslování v KB neodpovídá MD ČR — nutno ověřit"

  - kap: "31"
    nazev: "Dlažební prvky, dlažby"
    relevance_zihle: "podmíněně"
    odkaz_zd: "ZD §4.4.r — zpevnění dna koryta (kamenná dlažba)"
    kb_status: "missing"

