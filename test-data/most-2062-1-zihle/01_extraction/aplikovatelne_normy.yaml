# § 3. KB zdroje pro Phase B (návrh)
# ─────────────────────────────────────────────────────────────────────

kb_zdroje_pro_phase_b:
  - cesta: "B6_research_papers/upa_pokorny_suchanek_betonove_mosty_ii/INDEX.yaml"
    pouziti: "klasifikace mostu (BR_FRAME — rámový), volba technologie výstavby (pevná skruž — 14a), validační pravidla"
    klicove_sekce_pro_zihle:
      - "bridge_classification.keyword_to_element_type → ramovy_most (BR_FRAME, span 10–60 m). POZOR: Žihle ~9 m je POD spodním limitem typického rozpětí — flag pro Phase B."
      - "construction_technologies.pevna_skruz → 'fixed falsework', max length 100 m, max height 15 m, typical systems DOKA/PERI/HUNNEBECK/PEINER/PIZMO_STOJKY_IP"
      - "technology_decision_rules"
      - "validation_rules (VR-001..VR-011)"
    confidence: 1.0

  - cesta: "B6_research_papers/upa_pokorny_suchanek_betonove_mosty_ii/ch01_06_typy_mostu.yaml"
    pouziti: "detailní data per typ mostu (rámový — kapitola 4)"

  - cesta: "B6_research_papers/upa_pokorny_suchanek_betonove_mosty_ii/ch13_19_technologie_vystavby.yaml"
    pouziti: "kapitoly 14a (pevná skruž), 14b (MSS — pro Žihle nerelevantní), 15 (ILM — pro Žihle nerelevantní)"

  - cesta: "B7_regulations/csn_en_206_pruvodce/"
