  - cesta: "B2_csn_standards/tkp/tkp_22_izolace.json"
    pouziti: "TKP 26 izolace mostovek (číslo kap. v KB ≠ TKP — vyžaduje ověření)"

  - cesta: "B2_csn_standards/tkp/tkp_17_beton.json"
