    popis: "ČERPÁNÍ VODY DO 500 L/MIN — během betonáže základů + opěr (etapa SO 201, časově oddělené od SO 001/180)"
    mj: "HOD"
    mnozstvi: 160
    vypocet:
      formula: "doba_betonaze_NK × hodin_per_den × intenzita_factor"
      vstupy:
        doba_betonaze_dni:  {hodnota: 60,   jednotka: dní,    popis: "etapa základy + opěry + mostovka",                     zdroj: "Phase C harmonogram"}
        hodin_per_den:      {hodnota: 8,    jednotka: hod,    popis: "pracovní směna",                                        zdroj: "praxe"}
        intenzita_factor:   {hodnota: 0.33, jednotka: -,      popis: "nižší intenzita než SO 001 demolice (jáma vykopána, voda jen průsakem)", zdroj: "engineering judgment"}
      vypocet_kroky:
        - "60 × 8 × 0.33 = 158.4 ≈ 160 hod"
    confidence: 0.65
    jedn_cena_kc: 110.71
    note: |
      DUPLICATION CHECK: SO 001 T1-01 (200 hod během demolice + výkopu) + SO 180 T1-02
      (100 hod během výkopu pro objízdku) + SO 201 T1-01 (160 hod během betonáže NK)
      = časově oddělené etapy. Žádné překryvné období → no-duplication PASS.
      Total all-SO čerpání 460 hod.
    cena_celkem_kc: 17714
    source: "user_manual_fallback"   # User manual SO_201 row 17 = 360 hod (vyšší — Kfely template má víc fází)

  - polozka_id: "SO201-T1-02"
    otskp_kod: "17411"
    popis: "ZÁSYP JAM A RÝH ZEMINOU SE ZHUTNĚNÍM (kolem opěr a křídel po betonáži)"
    mj: "M3"
    mnozstvi: 181.0
    vypocet:
      formula: "objem_jamy − objem_NK_pod_terenem"
      vstupy:
        objem_jamy_m3:        {hodnota: 255, jednotka: m3, popis: "stavební jáma SO 001 T1-03",                                    zdroj: "SO001-T1-03"}
        objem_NK_pod_terenem: {hodnota: 74,  jednotka: m3, popis: "základy 30 m³ + spodek opěr 16.6 m³ + sklížek 5 m³ + drenáž 22.4 m³", zdroj: "calculator + Phase B"}
      vypocet_kroky:
        - "255 − 74 = 181 m³ (zásyp = jáma minus všechen objem konstrukce + drenáže pod terénem)"
    confidence: 0.85
    jedn_cena_kc: 175
    note: "User manual SO_201 row 23 = 181 m³ EXACT MATCH → reconciliation MATCH."
    cena_celkem_kc: 31675
    source: "user_manual_fallback"   # match s user manual

  - polozka_id: "SO201-T1-03"
    otskp_kod: "17511"
    popis: "OBSYP POTRUBÍ A OBJEKTU SE ZHUTNĚNÍM (kolem drenáží + odvodnění opěr)"
    mj: "M3"
    mnozstvi: 15.75
    vypocet:
      formula: "delka_drenaze × prurez_obsypu"
      vstupy:
        delka_m:    {hodnota: 35,    jednotka: m,   popis: "drenáž za opěrami (2× 8.30 m + návaznosti) + pod přechod. deskou", zdroj: "Phase B + ČSN 73 6244"}
        prurez_m2:  {hodnota: 0.45,  jednotka: m2,  popis: "obsyp ~0.6 × 0.75 m minus potrubí",                                 zdroj: "ČSN 73 6244 čl. 7.4"}
      vypocet_kroky:
        - "35 × 0.45 = 15.75 m³"
    confidence: 0.85
    jedn_cena_kc: 920
    note: "User manual SO_201 row 25 = 15.75 m³ EXACT MATCH."
    cena_celkem_kc: 14490
    source: "user_manual_fallback"

  - polozka_id: "SO201-T1-04"
    otskp_kod: "17581"
    popis: "OBSYP POTRUBÍ A OBJEKTU Z NAKUPOVANÝCH MATERIÁLŮ (filtračně-drenážní vrstva za opěrami)"
    mj: "M3"
    mnozstvi: 62.3
    vypocet:
      formula: "plocha_za_operami × tloustka_drenaze"
      vstupy:
        plocha_za_operami_m2: {hodnota: 89,    jednotka: m2,  popis: "2× opěra 8.30 × 2.0 + návaznosti k přechodovým deskám", zdroj: "Phase B"}
        tloustka_drenaze_m:   {hodnota: 0.70,  jednotka: m,   popis: "tloušťka drenážní vrstvy",                              zdroj: "ČSN 73 6244 čl. 7.4"}
      vypocet_kroky:
        - "89 × 0.70 = 62.3 m³"
    confidence: 0.85
    jedn_cena_kc: 1100
    note: "User manual SO_201 row 26 = 62.3 m³ EXACT MATCH."
    cena_celkem_kc: 68530
    source: "user_manual_fallback"

  - polozka_id: "SO201-T1-05"
    otskp_kod: "1778"
    popis: "ZEMNÍ HRÁZKY Z NAKUPOVANÝCH MATERIÁLŮ (úprava terénu kolem opěr před rekultivací)"
    mj: "M3"
    mnozstvi: 20.8
    vypocet:
      formula: "delka_obvodu_NK × prurez_hrazky"
      vstupy:
        delka_obvodu_m: {hodnota: 41.6, jednotka: m,   popis: "perimetr přechodu z mostu na terén (2× opěra + 2× návazné úseky)", zdroj: "Phase B"}
        prurez_m2:      {hodnota: 0.50, jednotka: m2,  popis: "trojúhelníková hrázka 1.0 × 1.0 / 2",                              zdroj: "ČSN 73 6244"}
      vypocet_kroky:
        - "41.6 × 0.50 = 20.8 m³"
    confidence: 0.8
    jedn_cena_kc: 800
    note: "User manual SO_201 row 27 = 20.8 m³ MATCH. Specifický pro SO 201 (návazný terén kolem nového mostu, ne objízdka)."
    cena_celkem_kc: 16640
    source: "user_manual_fallback"

  - polozka_id: "SO201-T1-06"
    otskp_kod: "171xx-uprava"
    popis: "FINÁLNÍ ÚPRAVA TERÉNU PŘED REKULTIVACÍ (urovnání + zhutnění před hydroosevem v SO 001 T9-16)"
    mj: "M2"
    mnozstvi: 300.0
    vypocet:
      formula: "obvod_NK_zona_uprava × sirka_pasma"
      vstupy:
        obvod_NK_m:      {hodnota: 60,   jednotka: m,    popis: "perimetr přechodu most-terén (T1-05) × 1.5 (rozšiřitelná zóna)", zdroj: "Phase B"}
        sirka_pasma_m:   {hodnota: 5,    jednotka: m,    popis: "průměrná šířka pásma terénní úpravy kolem mostu",                 zdroj: "engineering judgment"}
      vypocet_kroky:
        - "60 × 5 = 300 m² (terénní úprava před hydroosevem)"
    confidence: 0.7
    jedn_cena_kc: 65
    note: |
      Custom non-OTSKP placeholder pro úpravu terénu specifickou pro SO 201 (most kontext,
      ne objízdka). Hydroosev sám alokován v SO 001 T9-16. Zde se účtuje jen úprava před
      hydroosevem (urovnání + zhutnění + odstranění zbytkového kameniva).
    cena_celkem_kc: 19500
    source: "paušál_administrativní"

# =====================================================================
# TŘÍDA 2 — ZÁKLADY (calculator-driven core + drenážní vrstvy + fólie)
