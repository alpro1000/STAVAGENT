    L_celkova_m: 225              # 150 (povinná Žihle) + 75 (částečně Potvorov, dle PDPS)
    B_vozovky_m: 6.0              # silnice III/206 2 šířka jízdního pruhu
    plocha_celkova_m2: 1350
    L_vyloucena_zona_najezdu_m: 60   # 2× 30 m nájezdy SO 201 (vyloučeno z SO 290)
    plocha_najezdu_m2: 360
  frezovani:
    tloustka_frezovat_m: 0.05    # frézovat ACO obrusnou vrstvu
    objem_frezovani_m3: 67.5     # 1350 × 0.05
  prikopove_zlaby:
    L_jednostranne_m: 225        # 1× strana podél povinné + ~75 m podmíněné

