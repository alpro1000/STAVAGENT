    mnozstvi: 67.5
    vypocet:
      formula: "L × B × t"
      vstupy:
        L_m: {hodnota: 225,  jednotka: m, popis: "délka úpravy mimo most (300 m celkem − 60 m vyloučená zóna SO 201 nájezdů − 15 m přechod)", zdroj: "ZD §4.4.n + Phase B"}
        B_m: {hodnota: 6.0,  jednotka: m, popis: "šířka vozovky silnice III/206 2",                                                              zdroj: "ČSN 73 6101"}
        t_m: {hodnota: 0.05, jednotka: m, popis: "frézovat horní obrusnou ACO vrstvu",                                                          zdroj: "ČSN 73 6121 + ZD §4.4.n"}
