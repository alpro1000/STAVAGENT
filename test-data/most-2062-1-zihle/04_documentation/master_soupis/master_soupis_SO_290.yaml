# master_soupis_SO_290.yaml — SO 290 Silnice III/206 2 (směrová úprava + návaznosti)
#
# Žihle 2062-1 — silniční objekt (NE mostní)
# Scope: směrová úprava silnice III/206 2, km 0,600 – 0,900 (cca 300 m)
#        per ZD §4.4.n: úprava před nájezdem směr Žihle (povinná) + směr Potvorov (podmíněná).
#
# Source primary: user manual SO_201_parsed.yaml položky které logicky patří k silničnímu
#   objektu, NE k mostu (frézování navazujících úseků, ACL ložná na silnici, příkopové žlaby
#   silnice mimo nájezdy mostu, dopravní značení přístupů).
# Source fallback: ZD §4.4.n constraints + Kfely SO 290 reference.
#
# Pravidla:
#   1. Audit trail per položku (formula + vstupy + vypocet_kroky + confidence) MANDATORY.
#   2. No-work-duplication vs SO 201 (mostní vozovka SMA+ACL+ACP zostane v SO 201 t5).
#   3. Source field per položku (primary user_manual_fallback; calc nepokrývá silnice).

schema_version: 1
created: 2026-05-06
project: "Most ev.č. 2062-1 u obce Žihle"
SO: "SO 290 — Silnice III/206 2 (směrová úprava + návaznosti)"
phase: "D — Master soupis (Session 2)"
tskp_classes: ["1", "5", "9"]
scope: "Směrová úprava silnice III/206 2 (km 0,600 – 0,900) — overlay 2 vrstvami (ACL ložná + SMA obrusná) na frézovaný podklad mimo zónu mostu (SO 201)"
zd_constraints:
  delka_celkova_m: 300              # km 0,600 – 0,900
  povinna_uprava_smer_zihle_m: 150
  podminena_uprava_smer_potvorov_m: 150
  obrusna_vrstva_tolerance: "100 % bez tolerance (ZD §4.4.j přísnější TKP)"

