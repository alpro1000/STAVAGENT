    cena_celkem_kc: 50000
    source: "vrn_kalkulace_per_norma"

  - polozka_id: "VRN-05"
    otskp_kod: "VRN-BOZP-KOORDINATOR"
    popis: "KOORDINÁTOR BOZP NA STAVENIŠTI (povinný per zákon 309/2006 Sb. — staveniště s více zhotoviteli)"
    mj: "KPL"
    mnozstvi: 1
    vypocet:
