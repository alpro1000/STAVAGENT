      vstupy:
        revize_TZ_kc:           {hodnota: 12000, jednotka: Kč, popis: "revize technické zprávy DUR + odpovědi na RFI",  zdroj: "ČKAIT sazebník 2026"}
        koordinace_so_kc:       {hodnota: 8000,  jednotka: Kč, popis: "koordinace mezi SO 001/180/201/290/801",          zdroj: "praxe"}
        vyjadreni_doss_kc:      {hodnota: 10000, jednotka: Kč, popis: "vyjádření dotčených orgánů (Povodí Vltavy, LČR, Obec, ČEZ, GasNet, telekom)", zdroj: "tržní 2026"}
      vypocet_kroky:
        - "12 000 + 8 000 + 10 000 = 30 000 Kč"
    confidence: 0.75
    jedn_cena_kc: 30000
    note: |
      DUPLICATION CHECK: SO 201 t0 T0-05 (RDS 300k) + T0-06 (DSPS 80k) řeší TVŮRČÍ
