      vypocet_kroky:
        - "11 × 8 000 = 88 000 Kč"
    confidence: 0.85
    jedn_cena_kc: 88000
    note: |
      ★ POVINNÉ per zákon 309/2006 Sb. § 14 — staveniště, kde současně pracují více
