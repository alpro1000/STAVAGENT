        kolaudace_kc:            {hodnota: 8000,  jednotka: Kč, popis: "kolaudační rozhodnutí",                                          zdroj: "ČKAIT"}
        oznameni_dotcenym_kc:    {hodnota: 5000,  jednotka: Kč, popis: "oznámení dopravnímu policejnímu úřadu + okresnímu úřadu",       zdroj: "praxe"}
        AI_proces_kc:            {hodnota: 27000, jednotka: Kč, popis: "autorizovaný inženýr v procesu (písemná stanoviska, oddělené od dozoru SO 201 T0-09)", zdroj: "ČKAIT sazebník"}
      vypocet_kroky:
