# Žihle scope: malé manipulace, autojeřáb dostatečný (NO věžové jeřáby J1/J2/J3).

schema_version: 1
created: 2026-05-07
project: "Most ev.č. 2062-1 u obce Žihle"
SO: "PRESUN_HMOT — Přesun hmot stavby"
phase: "D — Master soupis (Session 3 retrofit)"
template_source: "D6 KV-Olšova vrata 2022-2023 sheet 'Přesun hmot'"

inputs:
  doba_konstrukce_NK_mesicu: 6
  doba_pomocnych_praci_mesicu: 4
  hodin_autojerab_for_NK: 100

# =====================================================================
# PŘESUN HMOT (3 položky — Žihle scaled)
# =====================================================================

presun_hmot:

  - polozka_id: "PH-01"
    kod_polozky: "PH-01"
    popis: "KRAMER BEZ OBSLUHY + NAFTA (univerzální nakladač pro manipulace v staveništi)"
    mj: "MES"
    mnozstvi: 6
    jedn_cena_kc: 35000
    cena_celkem_kc: 210000
    vypocet:
      formula: "měs × cena_per_měs"
      vstupy:
        mesice: {hodnota: 6, jednotka: měs, popis: "během konstrukce NK + opěr + přechodů", zdroj: "Phase C harmonogram", confidence: 0.8}
        cena:   {hodnota: 35000, jednotka: "Kč/měs", popis: "Kramer pronájem + diesel", zdroj: "D6 template (3 souborů identical)", confidence: 0.9}
      vypocet_kroky: ["6 × 35 000 = 210 000 Kč"]
    confidence: 0.85
    source: "d6_template_scaled"
    poznamka: "Kramer = univerzální. Merlo z D6 ne nutný — Kramer dostatečný pre malou stavbu."

  - polozka_id: "PH-02"
    kod_polozky: "PH-02"
    popis: "POMOCNÍ PRACOVNÍCI PŘI PŘESUNECH HMOT"
    mj: "OSOBA-MES"
    mnozstvi: 4
    jedn_cena_kc: 50000
    cena_celkem_kc: 200000
    vypocet:
      formula: "osoba × měs × cena_měsíční"
      vstupy:
        osoba:    {hodnota: 1, jednotka: osoba, popis: "1 pomocný pracovník",                      zdroj: "Žihle scale", confidence: 0.85}
        mesice:   {hodnota: 4, jednotka: měs, popis: "intenzivní fáze NK + opěry",                  zdroj: "Phase C", confidence: 0.85}
        cena:     {hodnota: 50000, jednotka: "Kč/měs", popis: "stavební dělník superhrubá mzda",    zdroj: "D6 template", confidence: 0.9}
      vypocet_kroky: ["1 × 4 × 50 000 = 200 000 Kč"]
    confidence: 0.85
    source: "d6_template_scaled"

  - polozka_id: "PH-03"
    kod_polozky: "PH-03"
    popis: "AUTOJEŘÁB S OBSLUHOU (montáž bednění + výztuže + betonáž mostovky)"
    mj: "HOD"
    mnozstvi: 100
    jedn_cena_kc: 1500
    cena_celkem_kc: 150000
    vypocet:
      formula: "hodin × sazba"
      vstupy:
        hodin: {hodnota: 100, jednotka: hod, popis: "manipulace pre NK montáž + bednění Top 50 + výztuž", zdroj: "Phase C engineering", confidence: 0.8}
        sazba: {hodnota: 1500, jednotka: "Kč/hod", popis: "autojeřáb s obsluhou", zdroj: "D6 template", confidence: 0.9}
      vypocet_kroky: ["100 × 1 500 = 150 000 Kč"]
    confidence: 0.85
    source: "d6_template_scaled"
    poznamka: "Autojeřáb = mobile crane. NE věžové jeřáby J1/J2/J3 — mostní stavba ne výškové."

