# master_soupis_SO_201_t8_t9.yaml — SO 201 (TSKP třídy 8 + 9)
#
# Žihle 2062-1 (integrální rámový most)
# Focused deliverable: potrubí (drenáže + chráničky) + ostatní práce (svodidla, dilatace,
# obrubníky, dopravní značení, zatěžovací zkouška, příkopové žlaby).
#
# Source primary: user manual `04_documentation/manual_reference_JS/SO_201_parsed.yaml`
#   třídy 8 (4 řád, 1 s mn>0) + 9 (21 řád, 19 s mn>0).
# Source secondary: ZD §4.4.l + §4.4.m (chráničky DN 75, integrální rám = bez ložisek/závěrů).
#
# Pravidla:
#   1. Audit trail per položku (formula + vstupy + vypocet_kroky + confidence) MANDATORY.
#   2. No-work-duplication vs SO 001 + SO 180 + SO 201 t0/t1_t2/t3_t4/t5_t6_t7.
#   3. Inline reconciliation flag pokud |delta calc vs user| > 10 %.
#   4. Source field per položku.
#
# EXPLICIT EXCLUSIONS per ZD §4.4.l (integrální rám):
#   - 428xxx mostní ložiska — žádná (integrální rám = monolit s opěrami, no bearing)
#   - 93152 mostní závěr — žádný (integrální rám = thermal expansion via přechodové desky)
#   - 4283x ložiska elastomer — žádná
#   POZN: 931326 + 93135 dilatační spáry V VOZOVCE jsou OK (asphalt expansion joints,
#         ne mostní závěry — slouží na přechodu most-vozovka pro thermal v krytu).

schema_version: 1
created: 2026-05-06
project: "Most ev.č. 2062-1 u obce Žihle"
SO: "SO 201 — Most (TSKP třídy 8 + 9)"
phase: "D — Master soupis (Session 2)"
tskp_classes: ["8", "9"]
scope: "Potrubí (drenáže, chráničky) + ostatní (svodidla, dopravní značení, obrubníky, dilatace vozovky, zatěžovací zkouška, příkopové žlaby)"

# ─────────────────────────────────────────────────────────────────────
# Vstupní geometrie + ZD constraints
# ─────────────────────────────────────────────────────────────────────

inputs:
  most_geometry:
    L_m: 12.0
    B_m: 8.30
    rimsa_L_m: 24.0           # 2× 12 m
    pole_count: 1             # rozpětí 9 m, jen 1 pole
  vozovka:
    plocha_celkova_m2: 565.5
    delka_dilatacnich_spar_m: 38.4   # užší okraj vozovky + okraj na přechodu
    delka_obrubniku_m: 45.0          # 2× 12.0 m mostu + 2× 15.0 m nájezdy minus okraje
  zd_constraints:
    zakaz_lozisek: "ZD §4.4.l: 'integrální rám bez ložisek'"
    zakaz_zaveru: "ZD §4.4.l: 'bez dilatačních závěrů' (mostní závěr 93152 vyloučen)"
    chranicky:    "ZD §4.4.m: '3× chránička DN 75 v pravé říмse pro budoucí kabely'"
    minimalni_odvodneni: "ZD §4.4.l: 'minimalizovat odvodňovače' (drobné odvodnění postačí přechodový spoj)"

