name: MCP Compatibility Test

on:
  push:
    paths:
      - 'concrete-agent/packages/core-backend/app/**'
      - 'concrete-agent/packages/core-backend/migrations/**'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_compatibility.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_auth_postgres.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_endpoints.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_oauth_pkce.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_dcr_crypto.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_dcr_endpoint.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_middleware_bearer.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_rate_limit.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_dcr_integration.py'
      - 'concrete-agent/packages/core-backend/tests/test_stage_gating_foundation.py'
      - 'concrete-agent/packages/core-backend/tests/test_stage_gating_policy.py'
      - 'concrete-agent/packages/core-backend/tests/test_stage_gating_session_db.py'
      - 'concrete-agent/packages/core-backend/tests/test_stage_gating_orchestrator.py'
      - 'concrete-agent/packages/core-backend/tests/test_stage_gating_audit.py'
      - 'concrete-agent/packages/core-backend/tests/test_stage_gating_pr3b.py'
      - 'concrete-agent/packages/core-backend/tests/test_element_name_normalizer.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_golden_so250.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_golden_so202.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_golden_so250b.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_golden_detect_object_type.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_golden_export_soupis.py'
      - 'concrete-agent/packages/core-backend/tests/test_thin_hybrid_recipe.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_golden_extract_tz_fields.py'
  pull_request:
    paths:
      - 'concrete-agent/packages/core-backend/app/**'
      - 'concrete-agent/packages/core-backend/migrations/**'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_compatibility.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_auth_postgres.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_endpoints.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_oauth_pkce.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_dcr_crypto.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_dcr_endpoint.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_middleware_bearer.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_rate_limit.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_dcr_integration.py'
      - 'concrete-agent/packages/core-backend/tests/test_stage_gating_foundation.py'
      - 'concrete-agent/packages/core-backend/tests/test_stage_gating_policy.py'
      - 'concrete-agent/packages/core-backend/tests/test_stage_gating_session_db.py'
      - 'concrete-agent/packages/core-backend/tests/test_stage_gating_orchestrator.py'
      - 'concrete-agent/packages/core-backend/tests/test_stage_gating_audit.py'
      - 'concrete-agent/packages/core-backend/tests/test_stage_gating_pr3b.py'
      - 'concrete-agent/packages/core-backend/tests/test_element_name_normalizer.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_golden_so250.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_golden_so202.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_golden_so250b.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_golden_detect_object_type.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_golden_export_soupis.py'
      - 'concrete-agent/packages/core-backend/tests/test_thin_hybrid_recipe.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_golden_extract_tz_fields.py'

jobs:
  mcp-compatibility:
    name: MCP Tools Compatibility
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: concrete-agent/packages/core-backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mcp_test
          POSTGRES_PASSWORD: mcp_test
          POSTGRES_DB: mcp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U mcp_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://mcp_test:mcp_test@localhost:5432/mcp_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: concrete-agent/packages/core-backend/requirements.txt

      - name: Install dependencies
        run: |
          # test_mcp_endpoints.py imports `app.main`, which pulls in the full
          # FastAPI app dep tree (anthropic, sqlalchemy[asyncio], google-cloud,
          # aiofiles, …). Install the production requirements so the import
          # chain resolves cleanly. test_mcp_{compatibility,auth_postgres}.py
          # don't strictly need it, but a single install keeps the matrix simple.
          pip install -r requirements.txt
          pip install fastmcp pytest pytest-asyncio fastapi httpx

      - name: Apply MCP Postgres migrations
        run: |
          # Apply ALL migrations in alphabetical order to match the runtime
          # `app/db/startup_migrations.py` behaviour (which globs
          # `migrations/*.sql` and sorts before applying). Hard-coding
          # specific filenames caused DCR migrations 009/010/011 to be
          # silently skipped, leaving test_mcp_oauth_pkce.py failing with
          # `UndefinedColumn: oauth_client_id` (added by 010).
          sudo apt-get update -qq && sudo apt-get install -yqq postgresql-client >/dev/null
          for migration in $(ls migrations/*.sql | sort); do
            echo "Applying $(basename "$migration") ..."
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"
          done
          # Print final schema state so CI logs document which tables exist
          # — invaluable when a future migration silently misnames a column.
          psql "$DATABASE_URL" -c "\dt mcp_*"

      - name: Run MCP compatibility tests
        env:
          # Enable http://localhost:* redirect_uri so the test fixture's
          # `http://localhost:9999/callback` is accepted by the allowlist.
          MCP_OAUTH_ALLOW_LOCALHOST_REDIRECT: "1"
          # Fail loud if the orchestrator endpoint tests can't run (missing dep /
          # broken app import) instead of silently skipping — rules out a
          # falsely-green run where endpoint coverage never executed.
          STAGEGATING_REQUIRE_ENDPOINT_TESTS: "1"
        run: |
          python -m pytest \
            tests/test_mcp_compatibility.py \
            tests/test_mcp_auth_postgres.py \
            tests/test_mcp_endpoints.py \
            tests/test_mcp_oauth_pkce.py \
            tests/test_mcp_dcr_crypto.py \
            tests/test_mcp_dcr_endpoint.py \
            tests/test_mcp_middleware_bearer.py \
            tests/test_mcp_rate_limit.py \
            tests/test_mcp_dcr_integration.py \
            tests/test_stage_gating_foundation.py \
            tests/test_stage_gating_policy.py \
            tests/test_stage_gating_session_db.py \
            tests/test_stage_gating_orchestrator.py \
            tests/test_stage_gating_audit.py \
            tests/test_stage_gating_pr3b.py \
            tests/test_element_name_normalizer.py \
            tests/test_mcp_golden_so250.py \
            tests/test_mcp_golden_so202.py \
            tests/test_mcp_golden_so250b.py \
            tests/test_mcp_golden_detect_object_type.py \
            tests/test_mcp_golden_export_soupis.py \
            tests/test_thin_hybrid_recipe.py \
            tests/test_mcp_golden_extract_tz_fields.py \
            -v --tb=short
