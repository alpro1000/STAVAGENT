name: MCP Compatibility Test

on:
  push:
    paths:
      - 'concrete-agent/packages/core-backend/app/**'
      - 'concrete-agent/packages/core-backend/migrations/007_mcp_api_keys.sql'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_compatibility.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_auth_postgres.py'
  pull_request:
    paths:
      - 'concrete-agent/packages/core-backend/app/**'
      - 'concrete-agent/packages/core-backend/migrations/007_mcp_api_keys.sql'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_compatibility.py'
      - 'concrete-agent/packages/core-backend/tests/test_mcp_auth_postgres.py'

jobs:
  mcp-compatibility:
    name: MCP Tools Compatibility
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: concrete-agent/packages/core-backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mcp_test
          POSTGRES_PASSWORD: mcp_test
          POSTGRES_DB: mcp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U mcp_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://mcp_test:mcp_test@localhost:5432/mcp_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: concrete-agent/packages/core-backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install fastmcp pytest pytest-asyncio pdfplumber openpyxl pandas httpx pydantic pydantic-settings python-dotenv psycopg2-binary bcrypt

      - name: Apply MCP Postgres migration
        run: |
          sudo apt-get update -qq && sudo apt-get install -yqq postgresql-client >/dev/null
          psql "$DATABASE_URL" -f migrations/007_mcp_api_keys.sql

      - name: Run MCP compatibility tests
        run: python -m pytest tests/test_mcp_compatibility.py tests/test_mcp_auth_postgres.py -v --tb=short
