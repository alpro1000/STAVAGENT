name: Keep-Alive Services

on:
  schedule:
    # Run every 14 minutes (cron format: minute hour day month day-of-week)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual trigger

# Cloud Run (PRIMARY) - europe-west3
# Render (FALLBACK) - kept for reference
#
# concrete-agent (Render fallback):    https://concrete-agent.onrender.com/healthcheck
# monolit-planner (Render fallback):   https://monolit-planner-api.onrender.com/healthcheck
# urs-matcher (Render fallback):       https://urs-matcher-service.onrender.com/health
# stavagent-portal (Render fallback):  https://stavagent-portal-backend.onrender.com/health
# rozpocet-registry (Render fallback): https://rozpocet-registry-backend.onrender.com/health

jobs:
  keep-alive:
    name: Ping Services to Prevent Sleep
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - name: concrete-agent
            url: https://concrete-agent-1086027517695.europe-west3.run.app/health
          - name: monolit-planner
            url: https://monolit-planner-api-1086027517695.europe-west3.run.app/health
          - name: urs-matcher-service
            url: https://urs-matcher-service-1086027517695.europe-west3.run.app/health
          - name: stavagent-portal
            url: https://stavagent-portal-backend-1086027517695.europe-west3.run.app/health
          - name: rozpocet-registry-backend
            url: https://rozpocet-registry-backend-1086027517695.europe-west3.run.app/health

    steps:
      - name: Ping ${{ matrix.service.name }}
        run: |
          echo "🔄 Pinging ${{ matrix.service.name }}..."

          # Retry configuration
          MAX_RETRIES=3
          RETRY_DELAY=10
          SUCCESS=false

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i of $MAX_RETRIES..."

            # Make request with secret key header
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "X-Keep-Alive-Key: ${{ secrets.KEEP_ALIVE_KEY }}" \
              -m 30 \
              "${{ matrix.service.url }}")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ ${{ matrix.service.name }} responded with 200 OK"
              SUCCESS=true
              break
            else
              echo "⚠️  Received HTTP $HTTP_CODE (expected 200)"
              if [ $i -lt $MAX_RETRIES ]; then
                echo "⏳ Waiting ${RETRY_DELAY}s before retry..."
                sleep $RETRY_DELAY
              fi
            fi
          done

          if [ "$SUCCESS" = "false" ]; then
            echo "❌ Failed to wake ${{ matrix.service.name }} after $MAX_RETRIES attempts"
            exit 1
          fi
        env:
          # Use GitHub Secrets for sensitive data
          KEEP_ALIVE_KEY: ${{ secrets.KEEP_ALIVE_KEY }}

      - name: Report Status
        if: always()
        run: |
          echo "📊 Keep-Alive Status for ${{ matrix.service.name }}: ${{ job.status }}"
