name: Test Rozpočet Registry

on:
  push:
    branches: [main]
    paths:
      - 'rozpocet-registry/**'
      - '.github/workflows/rozpocet-registry-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'rozpocet-registry/**'
      - '.github/workflows/rozpocet-registry-test.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'rozpocet-registry/package-lock.json'

      - name: Install dependencies
        working-directory: rozpocet-registry
        run: npm ci

      - name: Run tests
        working-directory: rozpocet-registry
        run: npm run test:run

      - name: Verify build
        working-directory: rozpocet-registry
        run: npm run build
