###############################################################
# concrete-agent — triggered only on changes in concrete-agent/**
###############################################################
substitutions:
  _REGION: europe-west3
  _AR_REPO: stavagent
  _CLOUD_SQL_INSTANCE: stavagent-db
  _TAG: latest
  _FORCE_DEPLOY: 'false'

steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: guard
    entrypoint: bash
    args:
      - -c
      - |
        if [ "${_FORCE_DEPLOY}" = "true" ]; then
          echo "Force deploy requested — skipping guard"
          exit 0
        fi
        if ! git rev-parse --git-dir >/dev/null 2>&1; then
          echo "No git repo (manual submit) — skipping guard"
          exit 0
        fi
        git fetch --depth=2 2>/dev/null || true
        CHANGED=$$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git show --name-only --format="" HEAD)
        echo "Changed files: $$CHANGED"
        if ! echo "$$CHANGED" | grep -q "^concrete-agent/"; then
          echo "No changes in concrete-agent/ — cancelling build"
          exit 1
        fi
        echo "Changes detected in concrete-agent/ — proceeding"

  - name: gcr.io/cloud-builders/docker
    id: build-concrete
    waitFor: [guard]
    args:
      - build
      - -f
      - concrete-agent/packages/core-backend/Dockerfile
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/concrete-agent:${_TAG}
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/concrete-agent:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push-concrete
    waitFor: [build-concrete]
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/concrete-agent
      - --all-tags

  - name: gcr.io/cloud-builders/gcloud
    id: deploy-concrete
    waitFor: [push-concrete]
    args:
      - run
      - deploy
      - concrete-agent
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/concrete-agent:${_TAG}
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8000
      - --add-cloudsql-instances=$PROJECT_ID:$_REGION:${_CLOUD_SQL_INSTANCE}
      - --set-env-vars=GEMINI_MODEL=gemini-2.5-flash-lite,MULTI_ROLE_LLM=vertex-ai-gemini,VERTEX_LOCATION=europe-west3,GOOGLE_PROJECT_ID=project-947a512a-481d-49b5-81c
      - --update-secrets=GOOGLE_API_KEY=GOOGLE_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,PERPLEXITY_API_KEY=PPLX_API_KEY:latest,DATABASE_URL=CONCRETE_DATABASE_URL:latest,SERVICE_TOKEN=SERVICE_TOKEN:latest

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/concrete-agent:${_TAG}

timeout: 1800s
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
