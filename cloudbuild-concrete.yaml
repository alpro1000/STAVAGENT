###############################################################
# concrete-agent — triggered only on changes in concrete-agent/**
###############################################################
substitutions:
  _REGION: europe-west3
  _AR_REPO: stavagent
  _CLOUD_SQL_INSTANCE: stavagent-db
  _TAG: latest
  _FORCE_DEPLOY: 'false'
  # 2026-06-11: _REDIS_URL/_VPC_CONNECTOR substitutions удалены — Memorystore
  # Redis + VPC-коннектор выведены из эксплуатации (cost task 3: rate-limiter
  # на Postgres, миграция 013; docs/deployment/redis_retirement_runbook.md).

steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: guard
    entrypoint: bash
    args:
      - -c
      - |
        if [ "${_FORCE_DEPLOY}" = "true" ]; then
          echo "Force deploy requested — skipping guard"
          exit 0
        fi
        if ! git rev-parse --git-dir >/dev/null 2>&1; then
          echo "No git repo (manual submit) — skipping guard"
          exit 0
        fi
        git fetch --depth=2 2>/dev/null || true
        CHANGED=$$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git show --name-only --format="" HEAD)
        echo "Changed files: $$CHANGED"
        if ! echo "$$CHANGED" | grep -q "^concrete-agent/"; then
          echo "No changes in concrete-agent/ — cancelling build"
          exit 1
        fi
        echo "Changes detected in concrete-agent/ — proceeding"

  # Pull previous image for layer caching (speeds up pip install)
  - name: gcr.io/cloud-builders/docker
    id: pull-cache
    waitFor: [guard]
    entrypoint: bash
    args:
      - -c
      - docker pull $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/concrete-agent:latest || true

  - name: gcr.io/cloud-builders/docker
    id: build-concrete
    waitFor: [pull-cache]
    args:
      - build
      - --cache-from
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/concrete-agent:latest
      - -f
      - concrete-agent/packages/core-backend/Dockerfile
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/concrete-agent:${_TAG}
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/concrete-agent:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push-concrete
    waitFor: [build-concrete]
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/concrete-agent
      - --all-tags

  # Deploy runs through bash so the REDIS_URL / VPC-connector flags can be
  # OMITTED when their substitutions are empty — gcloud rejects empty flag
  # values, and an unconditional `--set-env-vars=...,REDIS_URL=` would
  # silently overwrite the live value with '' (Part B, live-seal blockers
  # 2026-06-10). Flag semantics are unchanged from the previous args-style
  # step; only JWT_SECRET (secret-ref) + the two conditional flags are new.
  - name: gcr.io/cloud-builders/gcloud
    id: deploy-concrete
    waitFor: [push-concrete]
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        # `--set-cloudsql-instances` (not `--add-`) so each deploy is idempotent:
        # the previous list is replaced rather than appended to. This matters
        # because Cloud Run treats the cloudsql-instances list as an immutable
        # spec of the revision; an `--add-` deploy on top of a service whose
        # previous revision had different (e.g. stale or wrong-region) entries
        # can produce a revision where the Auth Proxy sidecar fails to mount
        # the right socket, leaving `/cloudsql/INSTANCE/.s.PGSQL.5432` absent
        # and libpq returning ENOENT (the 2026-05-14 MCP bug —
        # docs/audits/mcp_status/2026-05-14_cloudsql_connection_bug.md §2).
        #
        # `--set-env-vars` replaces the WHOLE env map each deploy — that is
        # exactly why manually-added env vars kept getting wiped. Everything
        # the service needs must therefore be in THIS list (or in
        # --update-secrets below).
        ENV_VARS="GEMINI_MODEL=gemini-2.5-flash,MULTI_ROLE_LLM=vertex-ai-gemini,VERTEX_LOCATION=europe-west3,GOOGLE_PROJECT_ID=project-947a512a-481d-49b5-81c,AWS_DEFAULT_REGION=us-east-1,BEDROCK_MODEL_ID=anthropic.claude-3-haiku-20240307-v1:0,BEDROCK_ENABLED=true"
        gcloud run deploy concrete-agent \
          --image=$_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/concrete-agent:${_TAG} \
          --region=$_REGION \
          --platform=managed \
          --allow-unauthenticated \
          --port=8000 \
          --min-instances=1 \
          --set-cloudsql-instances=$PROJECT_ID:$_REGION:${_CLOUD_SQL_INSTANCE} \
          --set-env-vars="$${ENV_VARS}" \
          --memory=6Gi \
          --timeout=1800 \
          --update-secrets=GOOGLE_API_KEY=GOOGLE_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,PERPLEXITY_API_KEY=PPLX_API_KEY:latest,XAI_API_KEY=XAI_API_KEY:latest,DEEPSEEK_API_KEY=DEEPSEEK_API_KEY:latest,DATABASE_URL=CONCRETE_DATABASE_URL:latest,SERVICE_TOKEN=SERVICE_TOKEN:latest,SERVICE_API_KEY=SERVICE_API_KEY:latest,AWS_ACCESS_KEY_ID=aws-access-key-id:latest,AWS_SECRET_ACCESS_KEY=aws-secret-access-key:latest,JWT_SECRET=JWT_SECRET:latest
          # HOTFIX-2 (2026-07-16): SERVICE_API_KEY = the SHARED ecosystem X-Service-Key
          # (SAME secret Monolit+Portal use — «set on Portal + all kiosks», serviceAuth.js;
          # NOT the Core-internal SERVICE_TOKEN above). The MCP delegate
          # (monolit_delegate.py) sends it so the now-fail-closed Monolit compute
          # endpoints (/api/calculate, /api/calculate-from-passport) accept it.
          # PREREQ: a Secret Manager secret named SERVICE_API_KEY must exist (it
          # already feeds Portal). If the deploy step errors «secret not found»,
          # the secret has a different name — adjust `SERVICE_API_KEY:latest` here.
        # (--memory: PR3 IFC streaming budget 1.5 GB/job, RssAbortGuard 95 %;
        #  --timeout: PR3 §15.4, longest observed pilot run ≈ 30 min.
        #  JWT_SECRET secret-ref added 2026-06-10 — it was manual-only and
        #  every deploy dropped it, killing the /orchestrate JWT path.)

  # NOTE 2026-05-14 — the previous `psql -f migrations/*.sql` step that
  # used to live here was a silent no-op (Cloud Build VM has no
  # /cloudsql/INSTANCE/.s.PGSQL.5432 socket mount, so every psql call
  # fell through to "skipped" with exit 0 and migrations never actually
  # ran in production — see docs/audits/mcp_status/2026-05-14_cloudsql_connection_bug.md §5).
  #
  # Migrations now run inside the FastAPI container at lifespan startup
  # via `app/db/startup_migrations.py`, where /cloudsql/ IS mounted. The
  # runner is idempotent (tracks applied filenames in `_schema_migrations`)
  # and protected against concurrent-instance races by a Postgres
  # advisory lock. Failure = lifespan exception = Cloud Run health check
  # red = automatic rollback. No further build-time step is needed.

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/concrete-agent:${_TAG}

# NOTE 2026-05-14 — the previous `availableSecrets.CONCRETE_DATABASE_URL`
# binding was consumed by the now-removed psql migration step (see the
# block comment above, and PR #1154). With that step gone, no remaining
# step uses `secretEnv: CONCRETE_DATABASE_URL` or `$$CONCRETE_DATABASE_URL`,
# so Cloud Build rejects the build with
# `invalid secrets: secretEnv CONCRETE_DATABASE_URL is defined without being used`.
#
# The Cloud Run-side binding on line 92 (`--update-secrets=...,DATABASE_URL=
# CONCRETE_DATABASE_URL:latest,...`) is *not* a Cloud Build secretEnv — it's
# a `gcloud run deploy` flag that reads the Secret Manager secret directly
# at runtime. That continues to work without `availableSecrets:`.
#
# Future migration approach (Cloud Run Job or app-side runner) is a
# separate backlog item — see docs/audits/mcp_status/migration_log.md
# "Carry-over: replace the cloudbuild psql step" §2-3.

timeout: 3600s
options:
  logging: CLOUD_LOGGING_ONLY
