###############################################################
# concrete-agent (CORE) — triggered only on changes in concrete-agent/**
###############################################################
substitutions:
  _REGION: europe-west3

steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: guard
    entrypoint: bash
    args:
      - -c
      - |
        git fetch --depth=2 2>/dev/null || true
        CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git show --name-only --format="" HEAD)
        echo "Changed files: $$CHANGED"
        if ! echo "$$CHANGED" | grep -q "^concrete-agent/"; then
          echo "No changes in concrete-agent/ — cancelling build"
          exit 1
        fi
        echo "Changes detected in concrete-agent/ — proceeding"

  - name: gcr.io/cloud-builders/docker
    id: build-core
    waitFor: [guard]
    args:
      - build
      - -f
      - concrete-agent/packages/core-backend/Dockerfile
      - -t
      - gcr.io/$PROJECT_ID/concrete-agent:$SHORT_SHA
      - -t
      - gcr.io/$PROJECT_ID/concrete-agent:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push-core
    waitFor: [build-core]
    args: [push, gcr.io/$PROJECT_ID/concrete-agent, --all-tags]

  - name: gcr.io/cloud-builders/gcloud
    id: deploy-core
    waitFor: [push-core]
    args:
      - run
      - deploy
      - concrete-agent
      - --image=gcr.io/$PROJECT_ID/concrete-agent:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated

images:
  - gcr.io/$PROJECT_ID/concrete-agent:$SHORT_SHA

timeout: 1800s
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
