###############################################################
# concrete-agent — triggered only on changes in concrete-agent/**
###############################################################
substitutions:
  _REGION: europe-west3
  _AR_REPO: stavagent
  _CLOUD_SQL_INSTANCE: stavagent-db
  _TAG: latest
  _FORCE_DEPLOY: 'false'

steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: guard
    entrypoint: bash
    args:
      - -c
      - |
        if [ "${_FORCE_DEPLOY}" = "true" ]; then
          echo "Force deploy requested — skipping guard"
          exit 0
        fi
        if ! git rev-parse --git-dir >/dev/null 2>&1; then
          echo "No git repo (manual submit) — skipping guard"
          exit 0
        fi
        git fetch --depth=2 2>/dev/null || true
        CHANGED=$$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git show --name-only --format="" HEAD)
        echo "Changed files: $$CHANGED"
        if ! echo "$$CHANGED" | grep -q "^concrete-agent/"; then
          echo "No changes in concrete-agent/ — cancelling build"
          exit 1
        fi
        echo "Changes detected in concrete-agent/ — proceeding"

  # Pull previous image for layer caching (speeds up pip install)
  - name: gcr.io/cloud-builders/docker
    id: pull-cache
    waitFor: [guard]
    entrypoint: bash
    args:
      - -c
      - docker pull $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/concrete-agent:latest || true

  - name: gcr.io/cloud-builders/docker
    id: build-concrete
    waitFor: [pull-cache]
    args:
      - build
      - --cache-from
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/concrete-agent:latest
      - -f
      - concrete-agent/packages/core-backend/Dockerfile
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/concrete-agent:${_TAG}
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/concrete-agent:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push-concrete
    waitFor: [build-concrete]
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/concrete-agent
      - --all-tags

  - name: gcr.io/cloud-builders/gcloud
    id: deploy-concrete
    waitFor: [push-concrete]
    args:
      - run
      - deploy
      - concrete-agent
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/concrete-agent:${_TAG}
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8000
      - --min-instances=1
      # `--set-cloudsql-instances` (not `--add-`) so each deploy is idempotent:
      # the previous list is replaced rather than appended to. This matters
      # because Cloud Run treats the cloudsql-instances list as an immutable
      # spec of the revision; an `--add-` deploy on top of a service whose
      # previous revision had different (e.g. stale or wrong-region) entries
      # can produce a revision where the Auth Proxy sidecar fails to mount
      # the right socket, leaving `/cloudsql/INSTANCE/.s.PGSQL.5432` absent
      # and libpq returning ENOENT (the 2026-05-14 MCP bug —
      # docs/audits/mcp_status/2026-05-14_cloudsql_connection_bug.md §2).
      - --set-cloudsql-instances=$PROJECT_ID:$_REGION:${_CLOUD_SQL_INSTANCE}
      - --set-env-vars=GEMINI_MODEL=gemini-2.5-flash,MULTI_ROLE_LLM=vertex-ai-gemini,VERTEX_LOCATION=europe-west3,GOOGLE_PROJECT_ID=project-947a512a-481d-49b5-81c,AWS_DEFAULT_REGION=us-east-1,BEDROCK_MODEL_ID=anthropic.claude-3-haiku-20240307-v1:0,BEDROCK_ENABLED=true
      - --timeout=600
      - --update-secrets=GOOGLE_API_KEY=GOOGLE_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,PERPLEXITY_API_KEY=PPLX_API_KEY:latest,XAI_API_KEY=XAI_API_KEY:latest,DEEPSEEK_API_KEY=DEEPSEEK_API_KEY:latest,DATABASE_URL=CONCRETE_DATABASE_URL:latest,SERVICE_TOKEN=SERVICE_TOKEN:latest,AWS_ACCESS_KEY_ID=aws-access-key-id:latest,AWS_SECRET_ACCESS_KEY=aws-secret-access-key:latest

  # Run NKB PostgreSQL migration (creates nkb_norms + nkb_rules if not exist)
  - name: gcr.io/cloud-builders/gcloud
    id: nkb-migration
    waitFor: [deploy-concrete]
    entrypoint: bash
    secretEnv: ['CONCRETE_DATABASE_URL']
    args:
      - -c
      - |
        # Install psql client
        apt-get update -qq && apt-get install -yqq postgresql-client >/dev/null 2>&1
        # Convert async URL to psql format
        DB_URL=$$(echo "$$CONCRETE_DATABASE_URL" | sed 's/+asyncpg//')
        # Run migrations (IF NOT EXISTS — safe to re-run)
        psql "$$DB_URL" -f concrete-agent/packages/core-backend/migrations/004_nkb_tables.sql \
          && echo "NKB migration OK" \
          || echo "NKB migration skipped (DB may be unavailable)"
        psql "$$DB_URL" -f concrete-agent/packages/core-backend/migrations/007_mcp_api_keys.sql \
          && echo "MCP api_keys migration OK" \
          || echo "MCP api_keys migration skipped (DB may be unavailable)"
        # NOTE 2026-05-14: this psql step has silently no-op'd ever since
        # PR #1147 — Cloud Build VM has no Cloud SQL Unix socket mount.
        # Migration 008 is queued here for the day the step is fixed
        # (Option 1 in docs/audits/mcp_status/migration_log.md). Until
        # then, apply 008 manually via cloud-sql-proxy + psql before
        # rolling traffic to a revision that uses /oauth/authorize.
        psql "$$DB_URL" -f concrete-agent/packages/core-backend/migrations/008_mcp_oauth_codes.sql \
          && echo "MCP oauth_codes migration OK" \
          || echo "MCP oauth_codes migration skipped (DB may be unavailable)"

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/concrete-agent:${_TAG}

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/CONCRETE_DATABASE_URL/versions/latest
      env: CONCRETE_DATABASE_URL

timeout: 3600s
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
