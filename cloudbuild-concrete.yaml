steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: guard
    entrypoint: bash
    args:
      - -c
      - |
        git fetch --depth=2 2>/dev/null || true
        CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git show --name-only --format="" HEAD)
        echo "Changed files: $CHANGED"
        if ! echo "$CHANGED" | grep -q "^concrete-agent/"; then
          echo "No changes in concrete-agent/ — cancelling build"
          exit 1
        fi
        echo "Changes detected in concrete-agent/ — proceeding"

  - name: gcr.io/cloud-builders/docker
    id: build-concrete
    args:
      - build
      - -t
      - europe-west3-docker.pkg.dev/project-947a512a-481d-49b5-81c/stavagent-repo/concrete-agent-backend:$SHORT_SHA
      - -t
      - europe-west3-docker.pkg.dev/project-947a512a-481d-49b5-81c/stavagent-repo/concrete-agent-backend:latest
      - concrete-agent

  - name: gcr.io/cloud-builders/docker
    id: push-concrete
    args:
      - push
      - europe-west3-docker.pkg.dev/project-947a512a-481d-49b5-81c/stavagent-repo/concrete-agent-backend
      - --all-tags

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-concrete
    args:
      - run
      - deploy
      - concrete-agent-backend
      - --image=europe-west3-docker.pkg.dev/project-947a512a-481d-49b5-81c/stavagent-repo/concrete-agent-backend:$SHORT_SHA
      - --region=europe-west3
      - --platform=managed
      - --allow-unauthenticated
      - --update-secrets=GOOGLE_API_KEY=GOOGLE_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,DATABASE_URL=DATABASE_URL:latest
