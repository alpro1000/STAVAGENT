###############################################################
# concrete-agent (CORE) — triggered only on changes in concrete-agent/**
###############################################################
substitutions:
  _REGION: europe-west3

steps:
  - name: gcr.io/cloud-builders/docker
    id: build-core
    args:
      - build
      - -f
      - concrete-agent/packages/core-backend/Dockerfile
      - -t
      - gcr.io/$PROJECT_ID/concrete-agent:$SHORT_SHA
      - -t
      - gcr.io/$PROJECT_ID/concrete-agent:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push-core
    waitFor: [build-core]
    args: [push, gcr.io/$PROJECT_ID/concrete-agent, --all-tags]

  - name: gcr.io/cloud-builders/gcloud
    id: deploy-core
    waitFor: [push-core]
    args:
      - run
      - deploy
      - concrete-agent
      - --image=gcr.io/$PROJECT_ID/concrete-agent:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated

images:
  - gcr.io/$PROJECT_ID/concrete-agent:$SHORT_SHA

timeout: 1800s
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
