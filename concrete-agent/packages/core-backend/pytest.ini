[pytest]
# Fail loud, never silently skip.
#
# --strict-markers: an unknown marker is a hard ERROR. If pytest-asyncio is NOT
# installed, an `@pytest.mark.asyncio` test would otherwise be collected and its
# coroutine never awaited — a silent no-await that fakes a green pass. With the
# marker registered below (and only) when the plugin is present, a plugin-less
# environment instead errors loudly on the unregistered marker.
#
# Note: the W3 SO-250 classifier golden (test_mcp_golden_so250.py) deliberately
# does NOT use this marker — it drives the real classifier coroutine via
# asyncio.run() in sync test functions, so it runs (and fails red) regardless of
# pytest-asyncio. The marker hardening here protects the async MCP suites.
addopts = --strict-markers

markers =
    asyncio: async test driven by pytest-asyncio (plugin must be installed).
