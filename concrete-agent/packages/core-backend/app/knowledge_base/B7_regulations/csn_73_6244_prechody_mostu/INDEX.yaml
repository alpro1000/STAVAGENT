    - "B7_regulations/vl_4_mosty/ (vzorové výkresy přechodů — VL 4-201.07, 302.01, atd.)"
    - "B7_regulations/en_1992_2_concrete_bridges/ (Eurokód 2 mosty)"
  secondary:
    - "B6_research_papers/upa_prechodove_oblasti/ (UPa skripta '05 Přechodové oblasti')"
    - "B6_research_papers/upa_pokorny_suchanek_betonove_mosty_ii/ (rámové mosty kap. 4)"
  tkp_relevant:
    - "TKP 21 (izolace mostů)"
    - "TKP 11 (svodidla, zábradlí — okraje přechodové oblasti)"

