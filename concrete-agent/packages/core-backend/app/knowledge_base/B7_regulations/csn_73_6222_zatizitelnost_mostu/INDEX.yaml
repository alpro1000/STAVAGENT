# ─────────────────────────────────────────────────────────────────────
# Validation rules pro STAVAGENT
# ─────────────────────────────────────────────────────────────────────
validation_rules:
  - id: VR-CSN73-6222-001
    description: "ZD požadavek musí korespondovat se skupinou normy"
    check: |
      def validate(zd_vn, zd_vr, zd_ve):
        if zd_vn == 32 and zd_vr == 80 and zd_ve == 180:
          return {'skupina': 1, 'valid': True}
        elif zd_vn == 22 and zd_vr == 40:
          return {'skupina': 2, 'valid': True}
        else:
          return {'valid': False, 'reason': 'Nestandardní hodnoty Vn/Vr/Ve'}

  - id: VR-CSN73-6222-002
    description: "HPM stav VI/VII = nucená intervence"
    check: |
      def validate(stavebni_stav):
        alpha = {'I': 1.0, 'II': 1.0, 'III': 1.0, 'IV': 0.8,
                 'V': 0.6, 'VI': 0.4, 'VII': 0.2}.get(stavebni_stav)
        if stavebni_stav in ['VI', 'VII']:
          return {'severity': 'CRITICAL', 'alpha': alpha,
                  'recommendation': 'Demolice nebo zásadní rekonstrukce'}
        elif stavebni_stav == 'V':
          return {'severity': 'HIGH', 'alpha': alpha,
                  'recommendation': 'Sanace nebo provozní omezení'}

