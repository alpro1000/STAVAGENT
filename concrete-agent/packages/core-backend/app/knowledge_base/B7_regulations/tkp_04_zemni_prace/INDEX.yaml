      tkp_4_sections: []
      governing_norms: ["TKP 11", "TKP 18", "VL 4"]
  validation_rules:
    - id: "VR-TKP4-001"
      description: "Zhutnění aktivní zóny min 100 % PS"
      check: "if element_type=='aktivni_zona' or near zemní pláň: D >= 100 %"
    - id: "VR-TKP4-002"
      description: "Hloubka založení nesmí být nad nezamrzající hloubkou (typ. 1.20 m)"
      check: "Volba per IGP + ČSN 73 6133 + region klimatu"
    - id: "VR-TKP4-003"
      description: "Žádné dřevo v trvalém zásypu (per §4.3.10)"
      check: "obsyp_drevenne_bedneni == false"
    - id: "VR-TKP4-004"
      description: "Sklon příčný parapláně min 2.5 %, max odchylka 1 %"
    - id: "VR-TKP4-005"
      description: "Zhutnění obsypu potrubí min 92 % PS"
    - id: "VR-TKP4-006"
      description: "Modul přetvárnosti — pravidlo o odchylkách (do 10 zkoušek = žádná pod hodnotu, od 11 = max 10 % o ≤10 % nižší, ne za sebou)"

# ─────────────────────────────────────────────────────────────────────
# Příloha P1 — Opravy a údržba zemních těles
# ─────────────────────────────────────────────────────────────────────
priloha_p1_opravy:
  scope: "Prohlídky, klasifikace poruch, opravy a údržba zemních těles na PK"
  prohlidky:
    bezne_vizualni_min_2x_rocne:
      - "Před zimním obdobím (říjen-listopad)"
      - "Na jaře (březen-duben)"
    hlavni: "Při uvedení do provozu, před skončením záruční doby, při inventarizaci"
    mimoradne: "Náhlé poškození (přívalové deště, zaplavení, zřícení skalních bloků)"
  klasifikace_poruch:
    lehke:
      examples: ["splavení humózní vrstvy", "erozní rýhy", "uvolňování drobných úlomků", "zanášení příkopů"]
      action: "Běžná údržba"
    stredni:
      examples: ["vývěry vody", "povrchové deformace", "poklesy krajnice", "trhliny"]
      action: "Posouzení geotech. firmou + dokumentace opravy"
    tezke:
      examples: ["sesutí svahu", "zřícení skal. bloků", "zaplavení", "velké propady vozovky"]
      action: "Havarijní stav — neprodleně sanace + zjednodušená dokumentace, omezení/zastavení provozu"
  zpusobilost:
    quality_system: "MP SJ-PK č.j. 20840/01-120, část II/4"
    references: "Min. 3 roky"

