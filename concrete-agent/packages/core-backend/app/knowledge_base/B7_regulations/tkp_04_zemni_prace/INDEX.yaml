# ─────────────────────────────────────────────────────────────────────
# §4.1 ÚVOD
# ─────────────────────────────────────────────────────────────────────
section_4_1_uvod:
  description: "Pojmy, ustanovení, návaznost na TKP 1, použití pouze společně s TKP 1"
  key_principles:
    - "TKP 4 navazuje na TKP 1 (Všeobecně), použití jen společně"
    - "Vydané pouze elektronicky (zabezpečený PDF na pjpk.rsd.cz)"
    - "Odkazy na ČSN/TP/jiné dokumenty se chápou v platném znění"
    - "Přílohy mají stejnou závaznost jako text kapitoly"
  scope: |
    Požadavky na materiály, technologické postupy, zkoušení a převzetí
    výkonů a dodávek při provádění zemních prací na stavbách pozemních
    komunikací. Příloha P1 řeší opravy a údržbu zemních těles.
  pd_requirements:
    must_comply_with:
      - "ČSN EN 1997-1 Eurokód 7"
      - "ČSN 73 6133 Návrh a provádění zemního tělesa pozemních komunikací"
      - "TKP 4 + související kapitoly TKP"
      - "Příslušné TP (TP 76, TP 94, TP 97, TP 146, TP 170, TP 198, TP 210, TP 268)"

# ─────────────────────────────────────────────────────────────────────
# §4.2 POPIS A KVALITA STAVEBNÍCH MATERIÁLŮ
# ─────────────────────────────────────────────────────────────────────
section_4_2_materialy:
  description: "Klasifikace zemin, hornin, alternativních materiálů"
  unsuitable_zeminy:
    description: "Nepoužitelné podle ČSN 73 6133"
    types:
      - "organické zeminy"
      - "bahna"
      - "rašelina"
      - "humus"
      - "ornice s obsahem org. látek > 6 % (suchá obj. hmotnost částic <2mm)"
    extreme_plastic_excluded:
      - ME (extrémně plastické)
      - CE (extrémně plastické)
    organic_test: "ČSN 72 1021"
  alternative_materials:
    types:
      - "strusky z výroby železných a neželezných kovů"
      - "vedlejší energetické produkty"
      - "stavební demoliční materiál"
      - "výsypky, hlušiny"
      - "recyklované materiály"
    governing_tp: ["TP 210 (recykláty)", "TP 268 (alternativní)"]
    required_specifications:
      - "přesný popis"
      - "technologie zpracování"
      - "návrhové fyzikálně-mechanické parametry"
      - "ekologická nezávadnost"
      - "vyluhovatelnost a její změny v čase"
      - "časový vývoj mech. vlastností"
      - "dlouhodobá objemová stálost"
      - "způsob kontroly + četnost"
  ocelove_vyztuzne_prvky:
    drat_taženy_za_studena: "ČSN EN 10079"
    svarovani_siti_a_mrizi: "ČSN EN 10080"
    galvanizace: "ČSN EN ISO 1461"
    quality_specs: "TKP 30"
  pojiva_pro_upravu_zemin:
    relevant_documents: ["TP 94", "ČSN 73 6133", "ČSN EN 16907-4"]

# ─────────────────────────────────────────────────────────────────────
# §4.3 TECHNOLOGICKÉ POSTUPY PRACÍ
# ─────────────────────────────────────────────────────────────────────
section_4_3_technologie:
  pre_work_requirements:
    - "Technologický předpis těžby a zpracování sypaniny — odsouhlasen Objednatelem/Správcem"
    - "Pro zpracování zemin s pojivy nebo vyztužování — zásady technologie v dokumentaci/ZTKP"
    - "Využít materiál vyzískaný ze staveniště v první řadě"
  vykopy:
    rozdeleni:
      - "Výkopy v trase (sejmutí humózní vrstvy + odtěžení do úrovně zemní pláně/parapláně)"
      - "Výkopy v zemníku (mimo trasu)"
      - "Výkopy pro zakládání objektů (mosty, opěrné/zárubní zdi, propustky)"
      - "Výkopy pro inženýrské sítě a odvodnění"
    klasifikace_tezitelnosti: "ČSN 73 6133, příloha D"
    skalní_výkopy_trhaviny:
      legal: "Zákon č. 61/1988 Sb."
      seismic_check: "ČSN 73 0040"
      method_for_zarezy: "Doporučen řízený výlom (presplit) pro definitivní úpravu"
    pažení:
      mandatory_thresholds:
        zastavene_uzemi: 1.3   # m
        nezastavene_uzemi: 1.5 # m
      ocelove_stenove_steny: "ČSN EN 12063"
  vykopy_pro_zakladani_mostnich_oper_relevant_zihle:
    description: "Klíčový pasáž pro Žihle — výkop pro plošný základ integrálního rámu"
    key_rules:
      - "Výkop ukončit nad projektovanou základovou spárou (cca 0.3 m) — chrání horninu před klimat. vlivy"
      - "Dotěžení na konečnou úroveň max. 48 hodin před návaznými pracemi"
      - "Pro základní spáru: geologická dokumentace + posouzení geotechnikem Zhotovitele"
      - "Při hladina podzemní vody → snížit čerpáním pod niveletu základové spáry"
      - "Bez písemného odsouhlasení od Objednatele/Správce nesmí být zakryta"
      - "Po odsouhlasení bezprostředně (do 1 pracovní směny) zahájit návazné práce"
      - "Dočasné výkopy nesmějí být ponechány přes zimní období"
  nasypy:
    types:
      - "Násypy ze zemin"
      - "Násypy z kamenité a balvanité sypaniny"
      - "Násypy z alternativních materiálů"
      - "Násypy vrstevnaté"
      - "Násypy vyztužené (TKP 30 + TP 97 + ČSN EN 14475)"
      - "Násypy vylehčené (TP 198)"
      - "Násypy ve vodě (ČSN EN 16907-1 + 16907-3)"
    zhutnovaci_zkouska:
      mandatory_for: "Dálnice, silnice I. třídy, místní rychlostní komunikace pokud objem zem. prací > 100 000 m³"
      optional_for: "Ostatní stavby — pokud nelze dosáhnout vlastnosti násypu předepsané dokumentací"
  podlozí_násypu:
    sklon_pro_svahove_stupne: 0.10  # 10% — nad tímto sklonem terénu kolmo k ose násypu se budují svahové stupně
    svahove_stupne_priny_sklon_min: 0.03  # 3% min příčný sklon
    geotextilie:
      separace_filtrace_min_taznost: 20  # %
  zaktivni_zona_a_zemni_plan:
    typical_thickness_m: 0.5  # od zemní pláně dolů
    podzemni_voda_min_pod_plani_m: 0.5
    geosynthetic_geocell_NOT_for_active_zone: true  # vyztužení AZ nemá význam pro únosnost podloží vozovky
    vyjimka: "Dočasné/účelové komunikace s nestmeleným krytem"
  zpetny_zasyp_obsypy_zaklady_mostu:
    cross_reference: ["ČSN 73 6244", "TKP 3 (inženýrské sítě)"]
    propustky_max_rozdil_urovne_zasypu_obou_stranach_m: 0.5
    zhutneni_blizkost_objektu_m: 1.0  # do 1 m od rubu konstrukce — zvláštní opatrnost
    drevo_v_zasypu: "NESMÍ BÝT (per § 4.3.10)"
  prechodova_oblast_KEY_FOR_BRIDGES:
    description: "Přechod z násypového tělesa na most"
    cross_reference_norm: "ČSN 73 6244 čl. 3"
    governing_norms_for_zemni_prace: ["ČSN 73 6244", "ČSN 73 6133", "ČSN 73 6201"]
    most_oper_na_pilotach_OR_uloznem_prahu:
      rule: "Při zakládání mostní opěry v tělese násypu na úložném prahu podepřeném pilotami se musí celé zemní těleso v přechodové oblasti, včetně svahových kuželů před opěrou, stavět současně."
      zasyp_kontrola_celou_vysku: "ČSN 73 6244"
    obsyp_kridel: "Současně na obou stranách (zabránit jednostrannému zatěžování)"
    ochranny_zasyp_za_operou: "Nenamrzavá zemina dle ČSN 73 6244"
    obsyp_kridel_a_objektu_zemina: "Pro stabilní svah dle dokumentace"
  nezpevnena_krajnice_dělicí_pás:
    suitable_zeminy: ["S1-S5", "G1-G5"]
    rezni_modul_deformace_min_MPa: 20  # M_vd ≥ 20 MPa per ČSN 73 6192 (lehká dynamická deska)
    recyklat_per_TP_210: true

# ─────────────────────────────────────────────────────────────────────
# §4.5 KONTROLNÍ ZKOUŠKY (klíčové pro classifier validation)
# ─────────────────────────────────────────────────────────────────────
section_4_5_kontroly:
  mira_zhutneni_pozadavky:
    nasyp_pojizdene_konstrukce: "Hodnoty dle ČSN 73 6133 tab. 10a, 10b"
    nasyp_nepoizdene_protihluk_valy: "Polovic. rozsah, min 3 zkoušky"
    obsyp_potrubi: 0.92   # 92 % PS minimum
    silnicni_teleso: 0.95  # 95 % PS
    aktivni_zona: 1.00    # 100 % PS
  precision_metody:
    primary: "Měření obj. hmotnosti in situ vs Proctor standard (D, %)"
    indirect:
      - "Statická zatěžovací zkouška (poměr modulů E_def,2 / E_def,1)"
      - "Rázová zatěžovací zkouška (ČSN 73 6192)"
      - "Dynamic/static penetration"
    membranove_objemomery: "1× lab. srovnávací obj. hmotnost na 3 stanovení (homogenní) / 1 (nehomogenní)"
  rough_stones_static_test:
    application: "Zeminy s hrubými úlomky a štěrkovými zrny >16 mm v množství >30 %"
    cannot_apply_lab_zhutnitelnost: true
  cetnost_zkousek_vsetky_dle_csn_736133:
    note: "ČSN 73 6133 tab. 9 (těžba), tab. 10a/b (násypy), tab. 13 (povolené odchylky)"
  prechodova_oblast_zhutneni: "Per ČSN 73 6244"

# ─────────────────────────────────────────────────────────────────────
# §4.6 PŘÍPUSTNÉ ODCHYLKY (kritické tolerance)
# ─────────────────────────────────────────────────────────────────────
section_4_6_odchylky:
  parapláň:
    odchylka_vysek_dalnice_silnice_I_II_mm: { plus: 30, minus: 40 }
    odchylka_vysek_mistni_komunikace_mm: { plus: 40, minus: 40 }
    odchylka_sirek_mm: { plus: 100, minus: 50 }
    odchylka_pricniho_sklonu_max_pct: 1.0
    min_pricni_sklon_pct: 2.5
    measurement_freq: "Každý druhý profil (obvykle po 40 m), 3 body jízdního pásu"
  modul_pretvarnosti:
    do_10_zkousek: "Žádná naměřená hodnota nesmí být nižší než předepsaná"
    od_11_zkousek: "Žádná hodnota o víc než 10 % nižší než předepsaná; max 10 % zkoušek smí být menších než předepsaná, ne za sebou"

# ─────────────────────────────────────────────────────────────────────
# §4.7 POVĚTRNOSTNÍ PODMÍNKY
# ─────────────────────────────────────────────────────────────────────
section_4_7_pocasi:
  nizke_teploty_kamenita_sypanina:
    min_temp_C: -5  # při teplotách nižších pouze sypanina z tvrdých skalních hornin
    obsah_zrn_do_2mm_max_pct: 15
    okraj_zhutnovani_zintenzivneni: "do vzdálenosti 2.5 m od okraje svahu — dvojnásobek počtu přejezdů"
    forbidden: "Sypání na poslední zmrzlou vrstvu"

# ─────────────────────────────────────────────────────────────────────
# §4.9 GEOTECHNICKÝ MONITORING
# ─────────────────────────────────────────────────────────────────────
section_4_9_monitoring:
  scope:
    - "Měření napětí v horninovém masivu / kontaktu s konstrukcí"
    - "Měření přetvoření zemních konstrukcí (svislá + vodorovná)"
    - "Měření hladiny podzemní vody + napětí v pórech"
    - "Měření protažení geosyntetické výztuže"
    - "Měření vibrací"

