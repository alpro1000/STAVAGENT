    prechodova_deska:
      tkp_4_sections: ["§4.3.11 Přechodová oblast"]
      key_rule: "Most_oper na pilotách + úložném prahu — celé zemní těleso v přechodové oblasti vč. svahových kuželů stavět současně"
      governing_norm_primary: "ČSN 73 6244"
