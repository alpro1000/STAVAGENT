# =====================================================================
# CROSS-PROJECT INSIGHTS
# =====================================================================
insights_for_future_pilots:

  - lesson: "≥ 3 vendors give meaningful median; 4 ideal"
    detail: |
      Žihle had 4 mostní provizorium vendors. Median per-line decomposition (montáž,
      demontáž, nájem, prohlídka) was within ±5 % of bundled vendor totals →
      median methodology validated. Single-vendor quote would have biased estimate.

  - lesson: "Bundled quotes need decomposition assumptions"
    detail: |
      VENDOR_PROV_C and VENDOR_PROV_D (Mosty Záboří 4 m + 3.5 m) provided bundled
      totals only. Žihle decomposed via industry-typical 25/22/53 split (montáž
      25 %, demontáž 22 %, nájem+prohlídka 53 %). Documented in audit trail of
      SO 180.

  - lesson: "Recyklace + skládka unit prices are CZ regional"
    detail: |
      Per-region pricing varies 10-30 %. RS Žatec (60-400 Kč/t) and DECO TRADE
      Nesuchyně (120 Kč/t) are Plzeň/Karlovy Vary kraj rates. Future pilots in
      different krajích need fresh RFQ; do NOT carry these prices over.

  - lesson: "Inflation 2026 vs 2022-2023 templates"
    detail: |
      D6 + Kfely templates date 2022-2023. Žihle vendor quotes from April-May 2026.
      Direct comparison shows ~10 % drift on doprava + ~0 % drift on standard buňky
      (confirmed Pattern F in ZS_templates/PATTERNS.md).

