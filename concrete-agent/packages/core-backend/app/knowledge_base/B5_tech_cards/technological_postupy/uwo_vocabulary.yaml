# UWO vocabulary v1.1 — axis-A controlled work vocabulary (Pattern 16).
#
# Single source of the `vocabulary_code` values that stage-4 Decompose emits and
# stage-5 Bind consumes (SPEC document-to-worklist §5.1/§6.3; ADR-009 D2).
# The LLM never sees catalog entries — it chooses from THIS list (~50 codes).
# Inventing a code is FORBIDDEN: an unknown work type becomes a registration
# proposal in a review queue (human approval = PR to this file), never a
# fabricated code.
#
# ── Market-proofing rules (ratified 2026-07-14, Alexander) ──────────────────
# 1. `label` / `keywords` are LANGUAGE MAPS (cs filled; de/es are EMPTY SLOTS,
#    not missing keys). Adding a German label = filling a slot, NEVER a schema
#    migration.
# 2. `unit_canonical` is the single canonical unit (m/m2/m3/m2_day/t/ks/kpl/h).
#    Local rendering (ks↔St↔ud, bm↔m↔ml) is the market adapter's job — no
#    per-market unit fields here.
# 3. Params carry NATIONAL SEMANTICS explicitly via `kind`:
#      scalar          — plain number/string, market-neutral (diameter_mm, depth_m)
#      eurocode_class  — EN-unified value, market-neutral BY EUROCODE
#                        (C30/37, XF4, B500B, Y1860 — same in CZ/DE/ES)
#      market_scheme   — value is MEANINGLESS without {market, scheme}:
#                        soil_class (ČSN 73 6133 I–VII vs DIN 18300 Bodenklassen
#                        RETIRED 2016 → Homogenbereiche — no direct mapping),
#                        formwork surface class (TKP C1d/C2d vs DBV SB1–SB4),
#                        curing class (TKP 18 vs ZTV-ING). Emitters MUST send
#                        {market, scheme, value}, never a bare number.
#
# ── Coverage contract (audit fix 2026-07-14, Alexander) ─────────────────────
# `coverage: covered` means THE DECOMPOSER BRANCH IS BUILT and can emit this
# atom — NOT "the code exists in this YAML". Built today:
#   · branch `monolit`      — WORK_TEMPLATES in the decomposition tool
#                             → CONCRETE / FORMWORK / REINFORCEMENT / PILING atoms
#   · branch `interier_psv` — ONE section shipped (malba.yaml MVP)
#                             → 3 FINISHES codes only; S2–S10 port = UWO F2, zbývá
# Everything else is `declared`: the router answers `not_covered_branch`
# honestly (never a concrete-template default). Honest tally: 13 covered /
# 34 declared.
#
# ── Provenance (Gate 0 recon 2026-07-14, bottom-up; corrected) ──────────────
#   T1: app/mcp/tools/breakdown.py WORK_TEMPLATES (live concrete branch)
#   T2: interiér: interier_psv/malba.yaml (shipped MVP) +
#       sandbox/uwo-interier-mezonet/src/templates.mjs S1–S10 (sandbox ≠ branch)
#   T2': HK212 hall domains — from Pattern 15/16 REGISTRY REFERENCES only; the
#        138-item corpus itself is READ-denied to agents → these codes are
#        UNVERIFIED against HK212 until the Gate-3 coverage harness (CI-side)
#        runs. Do not claim HK212 as a verified source before that.
#   T3: Pattern 16 domain list — declared, no codes yet.
#
# ── What is NOT vocabulary ──────────────────────────────────────────────────
# VRN / ZS items (koordinace, administrativa, hodinové sazby) are COST ARTICLES
# (ZS/VRN ~3–5 % per ČSN 73 0212), not physical work — they never get a
# vocabulary code. Billing constructs (HZS) likewise.
#
# Schema per code:
#   code: DOMAIN.CATEGORY.VARIANT (dot-notation, UPPER_SNAKE segments)
#   label: {cs: str, de: null, es: null}
#   keywords: {cs: [..], de: [], es: []}     # deterministic matching aid (seed, uncalibrated)
#   unit_canonical: m|m2|m3|m2_day|t|ks|kpl|h
#   params: [{name, kind, note?}]            # minimal in v1; schemas grow with adapters
#   coverage: covered | declared             # see coverage contract above

