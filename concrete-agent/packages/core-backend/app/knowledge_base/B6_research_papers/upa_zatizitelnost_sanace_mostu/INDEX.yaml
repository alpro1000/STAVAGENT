# ─────────────────────────────────────────────────────────────────────
# 1. Skupiny pozemních komunikací (slide 4)
# Source: ČSN EN 1991-2 + ČSN 73 6222
# ─────────────────────────────────────────────────────────────────────
skupiny_komunikaci:
  description: "Klasifikace komunikací pro účely zatížitelnosti"
  values:
    - id: 1
      typ: "Magistrální + dálnice + silnice I. třídy"
      vn_t: 32
      vr_t: 80
      ve_t: 180
      notes: "Standardní hodnoty pro nové mostní stavby"
    - id: 2
      typ: "Silnice II. a III. třídy + místní komunikace"
      vn_t: 22
      vr_t: 40
      ve_t: null
      notes: "Pro stávající mosty, ne pro nové stavby vyšších tříd"
  applies_to_zihle: 1  # ZD čl. 4.4.h požaduje 32/80/180 → skupina 1

# ─────────────────────────────────────────────────────────────────────
# 2. Klasifikační stupně stavebního stavu (slide 4)
# Source: ČSN 73 6222
# ─────────────────────────────────────────────────────────────────────
stavebni_stavy:
  description: "Stupně stavebního stavu s redukčním koeficientem α"
  values:
    - stupen: I
      popis: "bezvadný"
      alpha_koef: 1.0
    - stupen: II
      popis: "velmi dobrý"
      alpha_koef: 1.0
    - stupen: III
      popis: "dobrý"
      alpha_koef: 1.0
    - stupen: IV
      popis: "uspokojivý"
      alpha_koef: 0.8
    - stupen: V
      popis: "špatný"
      alpha_koef: 0.6
    - stupen: VI
      popis: "velmi špatný"
      alpha_koef: 0.4
    - stupen: VII
      popis: "havarijní"
      alpha_koef: 0.2
  
  application:
    description: "α násobí únosnost pro výpočet zatížitelnosti"
    formula: "Skutečná zatížitelnost = teoretická × α"
  
  applies_to_zihle:
    starý_most_NK: VI         # HPM 24.9.2025: stav VI velmi špatný (α=0.4)
    starý_most_SS: IV         # HPM: spodní stavba uspokojivá (α=0.8)
    nový_most_target: I       # nová stavba musí být bezvadná

# ─────────────────────────────────────────────────────────────────────
# 3. Schémata vozidel (slides 5-7)
# Source: ČSN 73 6222
# ─────────────────────────────────────────────────────────────────────
vehicle_schemas:
  description: "Idealized vehicle schemas for Vn/Vr/Ve calculation"
  
  vn_normal:
    description: "Normální zatížitelnost — průměrný provoz"
    cases:
      - mass_class: ">=16t"
        axles: 3  # předtní + zadní dvojice
        axle_loads: ["1/4 Vn", "3/8 Vn", "3/8 Vn"]
        spacing_mm: [1500, 2400, 1200, 900]  # přední, mezi nápravami, mezi koly
      - mass_class: "<16t"
        axles: 2
        axle_loads: ["1/4 Vn", "3/4 Vn"]
        spacing_mm: [1500, 3000, 1500]
  
  vr_vyhradni:
    description: "Výhradní zatížitelnost — výjimečné jednotlivé jízdy"
    cases:
      - mass_class: "<16t"
        axles: 2
        axle_loads: ["1/4 Vr", "3/4 Vr"]
        spacing_mm: [1500, 3000, 1500]
      - mass_class: ">=16t"
        axles: 3
        axle_loads: ["1/4 Vr", "3/8 Vr", "3/8 Vr"]
        spacing_mm: [1500, 2400, 1200, 900]
      - mass_class: ">50t"
        axles: 6
        axle_loads: ["1/6 Vr", "1/6 Vr", "1/6 Vr", "1/6 Vr", "1/6 Vr", "1/6 Vr"]
        spacing_mm: [750, 1500, 1500, 1500, 1500, 1500, 750]  # 6× 1.5 m + okraje
  
  ve_vyjimecna:
    description: "Výjimečná zatížitelnost — nadrozměrná vozidla"
    axles: 9
    axle_loads: ["1/9 Ve", "1/9 Ve", "1/9 Ve", "1/9 Ve", "1/9 Ve", "1/9 Ve", "1/9 Ve", "1/9 Ve", "1/9 Ve"]
    spacing_mm: [750, 1500, 1500, 1500, 1500, 1500, 1500, 1500, 1500, 750]

# ─────────────────────────────────────────────────────────────────────
# 4. Výpočet zatížitelnosti (slides 8-9)
# Source: ČSN 73 6222
# ─────────────────────────────────────────────────────────────────────
vypocet_zatizitelnosti:
  description: "Kombinovaný statický výpočet zatížitelnosti"
  
  formula_med:
    name: "M_Ed (návrhový moment)"
    expression: "M_Ed = Σ γ_G,j · M_Gk,j + γ_V · M_Vk,c + Σ γ_Q,i · ψ_0,i · M_Qk,i"
    components:
      - var: "γ_G,j"
        meaning: "partial factor stálých zatížení"
      - var: "M_Gk,j"
        meaning: "char. hodnoty momentů od stálých zatížení"
      - var: "γ_V"
        meaning: "partial factor zatížení vozidlem"
      - var: "M_Vk,c"
        meaning: "char. moment od vozidla zatížitelnosti"
      - var: "γ_Q,i"
        meaning: "partial factor proměnných zatížení"
      - var: "ψ_0,i"
        meaning: "kombinační součinitel"
  
  formula_mvkc:
    name: "M_Vk,c (max moment od vozidla)"
    expression: "M_Vk,c = (M_Rd - Σ γ_G,j · M_Gk,j) / γ_V"
    note: "Zjednodušená forma bez proměnných zatížení"
    components:
      - var: "M_Rd"
        meaning: "návrhový odpor (moment únosnosti)"
  
  metody:
    - name: "Kombinovaný statický výpočet"
      use_case: "Standardní postup pro stupně I-IV"
    - name: "Podrobný statický výpočet"
      use_case: "Pro stupně V-VII (špatný-havarijní stav)"

