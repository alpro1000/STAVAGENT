  unit: years
  
  per_element:
    rimsa:
      min: 30
      max: 50
      stavagent_element_type: rimsa
    vozovka:
      min: 20
      max: 30
      stavagent_element_type: null  # not in calculator (NOT element scope)
    svodidlo:
      min: 15
      max: 30
      stavagent_element_type: null
    zabradli:
      min: 15
      max: 30
      stavagent_element_type: null
    mostni_zaver:
      min: 15
      max: 30
      stavagent_element_type: null
      not_applicable_for_integral_bridge: true  # u rámových mostů žádné
    mostni_lozisko_vc_skruze:
      min: 30
      max: 50
      stavagent_element_type: null
      not_applicable_for_integral_bridge: true  # u rámových mostů žádná
    mostni_izolace:
      min: 30
      max: 50
      stavagent_element_type: null
    spodni_stavba:
      min: 60
      max: 100
      stavagent_element_type:
