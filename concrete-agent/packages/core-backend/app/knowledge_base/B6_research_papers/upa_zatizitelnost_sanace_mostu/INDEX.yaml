# ─────────────────────────────────────────────────────────────────────
# 9. Validation rules extractable from this source
# ─────────────────────────────────────────────────────────────────────
validation_rules:
  - id: VR-LOAD-001
    description: "ZD požadavek na novou stavbu musí spadat do skupiny 1"
    check: "if vn_t == 32 and vr_t == 80 and ve_t == 180: skupina = 1; OK"
  
  - id: VR-LOAD-002
    description: "Stavební stav VI/VII vyžaduje immediate intervention"
    check: "if stavebni_stav in ['VI', 'VII']: alpha < 0.5; warning='havarijní/velmi špatný'"
  
  - id: VR-LIFECYCLE-001
    description: "Nová NK musí mít navrženou životnost ≥60 let"
    check: "if element_type in [mostovkova_deska, opery_*, driky_*]: lifecycle_min >= 60"
  
  - id: VR-INTEGRAL-001
    description: "Integrální mosty nemají ložiska ani závěry — nepoužívat odpovídající lifecycle"
    check: "if construction_technology == 'integralni_ram': skip [mostni_zaver, mostni_lozisko]"
