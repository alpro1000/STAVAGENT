# ═══════════════════════════════════════════════════════════════════════
# INDEX.yaml — Pokorný-Suchánek "Betonové mosty II" → STAVAGENT mapping
# ═══════════════════════════════════════════════════════════════════════
# Účel: Strojově čitelný most mezi obsahem učebnice a element types 
#       v kalkulátoru STAVAGENT. AI Reasoner načítá tento soubor pro:
#         (1) klasifikaci mostů z TZ
#         (2) výběr formwork systému podle technologie výstavby  
#         (3) určení prestress subtype z popisu projektu
#         (4) lookup tlouštek/rozpětí pro sanity checks
# 
# Formát: vše dotazovatelné jako YAML (parsovatelný v Pythonu i Node).
# ═══════════════════════════════════════════════════════════════════════

source:
  metadata_ref: ./METADATA.md
  language: cs
  jurisdiction: CZ
  generated_for: STAVAGENT_calculator_v4.x
  schema_version: "1.0"

# ─────────────────────────────────────────────────────────────────────
# § 1. KLASIFIKACE MOSTŮ — rozhodovací strom
# ─────────────────────────────────────────────────────────────────────
# Použití: classifier dostane text TZ → určí element type
# ─────────────────────────────────────────────────────────────────────

bridge_classification:
  
  # Hraniční podmínka most vs propustek
  most_vs_propustek_threshold:
    parameter: "kolmá světlost otvoru"
    value_m: 2.0
    rule: "> 2.0 m → most; ≤ 2.0 m → propustek"
    source_clause: "ČSN 73 6200 (citováno v kap. 1, str. 12)"
    csn_compare:
      csn_value: 2.0
      csn_source: "ČSN 73 6200"
      verdict: "shoda — primárním zdrojem je ČSN 73 6200"

  # Rozdělení konstrukce mostu
  konstrukcni_cleneni:
    vrchni_stavba:
      definition: "nosná konstrukce + svršek + výplň + (nadnásyp)"
      components:
        - hlavni_nosna_konstrukce
        - mostovka
        - ztuzidla
        - loziska_a_klouby
        - dilatacni_zavery
        - vypln
    spodni_stavba:
      definition: "mostní podpěry + základy + mostní křídla + závěrné zdi"
      components:
        - opery
        - pilire
        - zaklady_hlubinne_nebo_plosne
        - mostni_kridla
        - zaverne_zdi

  # Rozhodující faktory pro volbu hlavní nosné konstrukce
  factors_for_construction_choice:
    - id: konstrukcni_prostor
      label_cs: "daný konstrukční prostor"
      affects: ["statický_systém", "rozpětí"]
    - id: zakladove_pomery
      label_cs: "základové poměry"
      affects: ["typ_podpor", "možnost_oblouku", "rámové_systémy"]
    - id: technologie_vystavby
      label_cs: "technologie výstavby"
      affects: ["všechny_komponenty"]
      note: "Během výstavby může působit jiný statický systém než v konečném stavu"
    - id: pouzity_material
      label_cs: "použitý materiál"
      affects: ["hmotnost", "únosnost"]
    - id: trvanlivost_udrzba
      label_cs: "trvanlivost a údržba"
      affects: ["volba_materiálu", "možnost_výměny"]
    - id: ekonomie
      label_cs: "ekonomie"
      affects: ["všechny_komponenty"]
    - id: estetika
      label_cs: "estetika a začlenění do krajiny"
      affects: ["volba_typu_mostu"]

  # Mapování keyword → element type (pro classifier)
  keyword_to_element_type:
    # Czech keywords s mapováním na STAVAGENT element_type
    # Toto je klíčový vstup pro Bridge Classifier z TZ textu
    deskovy_most:
      keywords_cs: ["desková", "deskový", "deska", "monolitická prostá deska", "vylehčená deska"]
      keywords_en: ["slab bridge", "plate"]
      element_type: BR_DECK_SLAB
      typical_span_range_m: [5, 25]
      reference_chapter: 2
    
    tramovy_most:
      keywords_cs: ["trámový", "trám", "T-průřez", "I-průřez", "žebrový"]
      keywords_en: ["girder bridge", "beam"]
      element_type: BR_GIRDER_T
      typical_span_range_m: [10, 30]  # ŽB do 25, předpjaté prefab do 30
      reference_chapter: 3
    
    komorovy_most:
      keywords_cs: ["komorový", "box", "komorový trám", "uzavřený komůrkový"]
      keywords_en: ["box girder", "box section"]
      element_type: BR_BOX_GIRDER
      typical_span_range_m: [40, 250]   # bez závěšení; se závěšením do 500
      reference_chapter: 3
    
    ramovy_most:
      keywords_cs: ["rámový", "rám", "vetknutý rám", "uzavřený rám", "vzpěradlový"]
      keywords_en: ["frame bridge", "rigid frame"]
      element_type: BR_FRAME
      typical_span_range_m: [10, 60]
      reference_chapter: 4
    
    nosnikovy_rost:
      keywords_cs: ["nosníkový rošt", "rošt", "trámový rošt"]
      keywords_en: ["beam grid", "grillage"]
      element_type: BR_BEAM_GRID
      typical_span_range_m: [15, 40]
      reference_chapter: 5
      note: "Ztužidla = příčníky; výpočet zjednodušen zanedbáním kroucení"
    
    obloukovy_most:
      keywords_cs: ["oblouk", "obloukový", "klenba", "klenutý", "vetknutý oblouk", "dvoukloubový oblouk", "trojkloubový oblouk"]
      keywords_en: ["arch bridge", "vault"]
      element_type: BR_ARCH
      typical_span_range_m_categories:
        presypane: [5, 30]      # přesypané — do 30 m
        velke_rozpony: [200, 500]  # nad 200 m letmá betonáž / letmá montáž
        nehospodarne: [30, 200]  # tato pásma nejsou hospodárná
      reference_chapter: 6
    
    visuty_most:
      keywords_cs: ["visutý", "visutý most", "lana přes pylon"]
      keywords_en: ["suspension bridge"]
      element_type: BR_SUSPENSION
      reference_chapter: 7d
    
    zaveseny_most:
      keywords_cs: ["zavěšený", "zavěšený most", "kabely zavěšené přes pylon"]
      keywords_en: ["cable-stayed bridge"]
      element_type: BR_CABLE_STAYED
      reference_chapter: 7d

# ─────────────────────────────────────────────────────────────────────
# § 2. PŘEDPÍNACÍ TYPY — klasifikace pro prestress engine
# ─────────────────────────────────────────────────────────────────────

prestressing_type_classification:
  
  predem_predpjate:
    label_cs: "předem předpjaté (pre-tensioned)"
    label_en: "pre-tensioned"
    bond_with_concrete: "with_bond"  # se soudržností
    typical_use: "prefabrikované mostní konstrukce"
    workflow_short: "napnutí_výztuže → betonáž → tvrdnutí_80%_pevnosti → uvolnění_kotvení → vnesení_předpětí"
    typical_products:
      - VSTI_2000
      - I_DZ_97
      - TT_DZ_97
      - MK_T
    typical_span_range_m: [10, 30]
    keyword_match:
      - "předem předpjaté"
      - "předpjatá výroba"
      - "pre-tensioned"
    reference_chapter: 7b

  dodatecne_predpjate:
    label_cs: "dodatečně předpjaté (post-tensioned)"
    label_en: "post-tensioned"
    bond_with_concrete: "with_bond_or_without"  # se soudržností i bez
    typical_use: "mosty na rozpětí střední a velké z předpjatého betonu"
    workflow_short: "kabelové_kanálky_v_bednění → betonáž → protažení_kabelů → předepnutí → injektáž"
    typical_products:
      - MK_T
      - MK_T_CD
      - T_93
      - T_2000_PETRA
    legacy_pre_1990:
      - KA_67
      - KA_73
      - I_67
      - I_73
    typical_span_range_m: [25, 250]
    keyword_match:
      - "dodatečně předpjaté"
      - "post-tensioned"
      - "kabelobeton"
      - "kabelové kanálky"
    reference_chapter: 7c

  vnejsi_predpeti:
    label_cs: "vnější předpětí (volné kabely)"
    label_en: "external prestressing"
    bond_with_concrete: "without_bond"
    typical_use: "většinou vícelanové kabely vedené mimo betonový průřez pomocí deviátorů"
    typical_location: "v dutině komorového průřezu"
    requires_components:
      - deviatory  # masivní bloky betonu nebo ocelové prvky pro vychýlení dráhy
      - kotevni_bloky
      - sedla
    typical_use_cases:
      - "rekonstrukce mostů"
      - "lana přes pylon (zavěšené mosty)"
    keyword_match:
      - "vnější předpětí"
      - "volné kabely"
      - "external prestressing"
      - "deviátory"
    reference_chapter: 7d

