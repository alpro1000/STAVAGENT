      - id: kladne_zaporne
        label_cs: "kladné a záporné kabely"
        function: "redukce tahových napětí ve středu rozpětí a nad podporami"
        when_tensioned: "po vybetonování střední spáry"
      - id: spojitosti
        label_cs: "kabely spojitosti"
        function: "zajišťují spojitost vahadel"
        sub_types:
          - id: vnitrni_soudrzne
            location: "kotvené v zesílené části u podpěr"
          - id: vnejsi_volne
            location: "kotvené v podporových příčnících"
            requirement: "vyžadují deviátory"
    casting_carriage:
      label_cs: "betonovací vozík"
      construction: "příhradová konstrukce"
      mass_t: [50, 80]  # 50-80 t — důležité pro statickou analýzu montáže
      positions:
        - nad_konstrukci
        - pod_konstrukci
      material_transport: "kabelové nebo sloupové jeřáby"
    reference_projects:
      - "Most na D8 přes Vltavu (spojitý nosník o 3 polích)"
      - "Most přes Nuselské údolí Praha (sdružený rám o 5 polích)"
      - "Zvíkovské mosty přes Otavu a Vltavu"
      - "Most přes údolí řeky Kocher (Německo)"
      - "Největší obloukový most na světě — ostrov Krk (Chorvatsko)"
    advantages:
      - "vhodné pro vysoké podpěry"
      - "nevyžaduje podpůrné konstrukce"
      - "neomezuje provoz pod mostem"
      - "úspora bednění"
      - "rychlá výstavba"
      - "během výstavby = staticky určitá konstrukce"
      - "lze použít pro zavěšené a obloukové mosty"
    disadvantages:
      - "zárodek trvá několik týdnů"
      - "vysoké nároky na statický výpočet (váha vozíku 50-80 t)"
      - "reologické projevy (segmenty různého stáří)"
      - "stísněný pracovní prostor"
    formwork_engine_mapping: "BALANCED_CANTILEVER_VOZIK"

  prefab_segmentove:
    label_cs: "prefabrikované segmentové konstrukce (příčně dělené)"
    label_en: "precast segmental"
    chapter: 18
    economic_for_span_range_m: [30, 200]
    segment_length_m: [2.5, 4.0]
    typical_section_types:
      - komorovy
      - dvoutrám
      - parapetni_tramovy
    static_systems:
      - "prosté nosníky o více polích"
      - "spojité nosníky"
      - "rámové konstrukce"
      - "sdružené rámy"
      - "oblouky"
      - "zavěšené mosty"
      - "visuté mosty"
    joint_filling_evolution:
      - period: "nejstarší"
        material: "beton"
      - period: "moderní"
        material: "epoxidový tmel (epoxidový tmel + tužidlo)"
        note: "betonové spáry dnes jen jako uzavření spáry mezi montážními celky"
    production_methods:
      - id: dlouha_draha
        label_cs: "metoda dlouhé dráhy"
        track_length_m: "polovina pole"
        advantage: "snadná kontrola geometrie"
        disadvantage: "velký požadavek na prostor"
      - id: kratka_draha
        label_cs: "metoda krátké dráhy"
        cell_capacity: "2 segmenty"
        advantage: "možnost segmentů přímých i výrazně zakřivených"
        disadvantage: "nutno sledovat hydratační teplo"
    curing:
      until_strength_pct: 70
      method: "kropení po 24 hodinách po vybetonování"
    storage_max_layers: 2
    erection_methods:
      - id: letmo_obe_strany
        label_cs: "letmo na obě strany pilíře"
        common: true
        for_span: ["střední", "velké"]
        workflow: "zárodek → symetrické připojení segmentů → dobetonování střední části → zmonolitnění předepnutím"
      - id: kratsi_zavazeci_most
        label_cs: "montáž kratším zavážecím mostem"
        bridge_length_to_span_ratio: 1.5
      - id: delsi_zavazeci_most
        label_cs: "montáž delším zavážecím mostem"
        bridge_length_to_span_ratio: 2.0
        advantage: "urychlení montáže pomocí 2 zvedacích zařízení"
      - id: kolovy_jerab_uzaviraci_most
        label_cs: "kolový jeřáb a uzavírací most"
        advantage: "segmenty nezatěžují konstrukci v průběhu výstavby"
        disadvantage: "výška mostu omezena zdvihem"
      - id: jerab_pojezd_konstrukce
        label_cs: "jeřáb pojíždějící po konstrukci"
        disadvantage: "výška mostu omezena zdvihem vozíku"
      - id: vpred_25_50m
        label_cs: "montáž vpřed (estakády L=25-50 m)"
        sub_methods:
          - "podpírání konzoly provizorními podpěrami"
          - "vyvěšování konzoly pylonem + lana"
      - id: vpred_kolovy_jerab
        label_cs: "montáž vpřed kolovými mobilními jeřáby"
        constraint: "dobrý přístup k mostu"
    formwork_engine_mapping: "PREFAB_SEGMENT"

# ─────────────────────────────────────────────────────────────────────
# § 6. ROZHODOVACÍ LOGIKA: technologie výstavby podle parametrů
# ─────────────────────────────────────────────────────────────────────
# AI Reasoner použije při výběru technologie výstavby
# Vstup: rozpětí, délka mostu, výška nad terénem, počet polí, terén
# Výstup: doporučená technologie + zdůvodnění

technology_decision_rules:
  - rule_id: TR-001
    name: "Krátký most na rovině"
    conditions:
      bridge_length_m_lt: 100
      max_height_m_lt: 15
      terrain_complexity: "any"
    recommended:
      - pevna_skruz
    rationale: "Pevná skruž je hospodárná pro krátké mosty s nízkou konstrukcí"

  - rule_id: TR-002
    name: "Dlouhý most s opakujícími poli"
    conditions:
      bridge_length_m_gt: 400
      span_consistency: "stálé rozpětí"
      width_consistency: "konstantní šířka"
    recommended:
      - posuvna_skruz
    rationale: "Posuvná skruž je hospodárná díky opakování technologie"

  - rule_id: TR-003
    name: "Velmi dlouhé rozpětí přes překážku"
    conditions:
      span_m_gt: 200
      below_obstacle: "hluboké údolí, široká řeka, průplav"
    recommended:
      - letma_betonaz
    rationale: "Letmá betonáž nevyžaduje podpůrné konstrukce a neomezuje provoz pod mostem"

  - rule_id: TR-004
    name: "Most s konstantní křivostí, omezený přístup pod mostem"
    conditions:
      span_m_range: [15, 40]
      curvature: "konstantní"
      access_below: "omezený"
    recommended:
      - vysouvane_konstrukce
    rationale: "ILM nevyžaduje přístup pod mostem; lamely se betonují za opěrou"

  - rule_id: TR-005
    name: "Most přes existující komunikaci nebo trať"
    conditions:
      cross_obstacle: ["železnice", "dálnice", "frekventovaná komunikace"]
      construction_disturbance: "minimum"
    recommended:
      - otacene_konstrukce
      - prefab_segmentove
    rationale: "Otáčená konstrukce minimalizuje zásah do provozu"

  - rule_id: TR-006
    name: "Estakáda střední délky"
    conditions:
      span_m_range: [25, 50]
      type: "estakáda"
    recommended:
      - prefab_segmentove
    rationale: "Prefab segmenty + montáž vpřed jsou hospodárné pro tato rozpětí"

# ─────────────────────────────────────────────────────────────────────
# § 7. CROSS-DOMAIN VALIDATION RULES
# ─────────────────────────────────────────────────────────────────────
# Pravidla pro detekci nekonzistencí mezi částmi projektu
# Použití: B9_validation modul

validation_rules:
  - rule_id: VR-001
    description: "Komorový průřez vyžaduje rozpětí > 40 m"
    check: |
      if section_type == 'komorovy' and span_m < 40:
        warning: "Komorový průřez je obvykle navrhován pro rozpětí ≥ 40 m. Zvažte trámový průřez."
    source_clause: "kap. 3, str. 22"

  - rule_id: VR-002
    description: "Letmá betonáž ekonomická pro rozpětí > 200 m"
    check: |
      if technology == 'letma_betonaz' and span_m < 100:
        warning: "Letmá betonáž je metoda pro rozpětí > 200 m. Pro krátká rozpětí zvažte skruže nebo prefab."
    source_clause: "kap. 17, str. 106"

  - rule_id: VR-003
    description: "Vysouvané konstrukce vyžadují konstantní křivost"
    check: |
      if technology == 'vysouvane' and curvature == 'variable':
        error: "Vysouvané konstrukce lze provádět pouze na mostech s konstantní křivostí."
    source_clause: "kap. 15, str. 104"

  - rule_id: VR-004
    description: "Pevná skruž omezena délkou mostu a výškou"
    check: |
      if technology == 'pevna_skruz' and (bridge_length_m > 100 or max_height_m > 15):
        warning: "Pevná skruž je vhodná pro mosty < 100 m a výšku < 15 m. Zvažte posuvnou skruž."
    source_clause: "kap. 14a, str. 95"

  - rule_id: VR-005
    description: "Předem předpjaté konstrukce — vedení výztuže omezené"
    check: |
      if prestress_type == 'predem' and (curve_path == 'parabolic_complex' or polygonal_path == True):
        warning: "Předem předpjaté konstrukce mají omezené možnosti vedení předpínací výztuže (rovné lano)."
    source_clause: "kap. 7b, str. 63"

  - rule_id: VR-006
    description: "Maximální napínací síla = 0.8 × f_pk"
    check: |
      tensioning_force_kN <= 0.8 * f_pk_kN
    source_clause: "kap. 10, str. 79; ČSN EN 1992-1-1"

  - rule_id: VR-007
    description: "Maximální provozní síla = 0.7 × f_pk"
    check: |
      service_force_kN <= 0.7 * f_pk_kN
    source_clause: "kap. 10, str. 79"

  - rule_id: VR-008
    description: "Minimální poloměr zakřivení kabelu"
    check: |
      if n_strands > 22:
        R_min_m = 8.6
      else:
        R_min_m = 4.8
    source_clause: "kap. 10, str. 79; Tabulka 12"

  - rule_id: VR-009
    description: "Krytí kabelového kanálku — staré ČSN"
    check: |
      cover_to_duct_mm >= max(duct_diameter_mm, 30)
    source_clause: "kap. 8 (ČSN 73 6207 — neplatná); pro nové projekty viz ČSN EN 1992-2"

  - rule_id: VR-010
    description: "Předpínací výztuž — dosažení 80% pevnosti před uvolněním kotvení"
    check: |
      concrete_strength_at_release_pct >= 80
    source_clause: "kap. 7b, krok 6 pracovního postupu"

  - rule_id: VR-011
    description: "Letmá betonáž — předepínání po 42h"
    check: |
      curing_time_before_prestressing_h >= 42 and concrete_strength_MPa >= 25
    source_clause: "kap. 17, krok 6 pracovního postupu"
