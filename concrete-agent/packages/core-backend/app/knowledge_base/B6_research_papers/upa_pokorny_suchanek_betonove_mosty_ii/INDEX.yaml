    disadvantages:
      - "pouze pro mosty s konstantní křivostí"
    formwork_engine_mapping: "ILM_specialni"

  otacene_konstrukce:
    label_cs: "otáčené konstrukce"
    label_en: "rotated construction"
    chapter: 16
    workflow: "stavba podél překážky → otočení do požadované polohy"
    sliding_surface: "nerezavějící ocel s teflonovým povrchem; podpora elastomerovými deskami"
    rare_technology: true

  letma_betonaz:
    label_cs: "letmá betonáž (balanced cantilever)"
    label_en: "balanced cantilever / free cantilever"
    chapter: 17
