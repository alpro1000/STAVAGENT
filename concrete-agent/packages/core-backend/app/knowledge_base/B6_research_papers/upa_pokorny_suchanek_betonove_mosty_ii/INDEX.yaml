      - "betonáž úseku + 42h technologická přestávka (cca 25 MPa)"
      - "předepnutí lamely k existující konstrukci"
      - "odbednění a posun vozíku na druhou stranu konzoly"
      - "koncové části — dobetonování na skruži"
    cable_categories:
      - id: montazni
        label_cs: "montážní (konzolové) kabely"
