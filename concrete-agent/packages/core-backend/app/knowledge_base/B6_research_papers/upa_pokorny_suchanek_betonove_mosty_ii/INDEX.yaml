# ─────────────────────────────────────────────────────────────────────
# § 5. TECHNOLOGIE VÝSTAVBY — klíčové pro element-scheduler + formwork
# ─────────────────────────────────────────────────────────────────────

construction_technologies:
  
  pevna_skruz:
    label_cs: "pevná skruž (lešení)"
    label_en: "fixed falsework"
    chapter: 14a
    typical_use_cases:
      - "mosty složitého půdorysného tvaru"
      - "při velkém spádu"
      - "kdy nelze využít prefabrikaci"
    constraints:
      max_bridge_length_m: 100
      max_height_above_ground_m: 15  # 10-15 m
    typical_systems:
      - DOKA       # bednění
      - PERI
      - HUNNEBECK
      - PEINER
      - PIZMO_STOJKY_IP  # ocelové inventární podpěry
    advantages:
      - "možnost použití i pro složitá geometrie"
      - "ekonomicky výhodné při opakovaném použití (3-4 polí celá; dlouhé = přestavování)"
    disadvantages:
      - "omezení délky a výšky"
      - "závislost na terénu pod mostem"
    formwork_engine_mapping: "tradicni_bedneni"  # → fallback v calculator
    
  posuvna_skruz:
    label_cs: "posuvná skruž (movable formwork system)"
    label_en: "movable formwork system (MSS)"
    abbreviation: "MSS"
    chapter: 14b
    economic_for_span_range_m: [30, 100]   # 30-60 celé pole, 60-100 segmentová
    economic_for_total_length_m_min: 400   # více jak 400 m
    suitable_section_types:
      ["deskový", "trámový", "komorový"]
    static_systems:
      - "prosté nosníky"
      - "spojité nosníky"  
      - "rámové"
    skruz_length_to_span_ratio: [1.3, 2.5]  # 1.3-2.5 × rozpětí pole
    main_girder_position:
      - id: pod_konstrukci
        label_cs: "pod konstrukcí mostu (s bedněním podpíraným)"
        advantage: "Prostor na skruži je volný pro veškeré práce"
      - id: nad_konstrukci
        label_cs: "nad konstrukcí mostu (s bedněním zavěšeným)"
        advantage: "Hlavní nosník dostatečné výšky bez omezení prostoru pod mostem"
    workflow:
      - "sestavení v předpolí mostu, zasunutí do prvního pole"
      - "vyrovnání bednění"
      - "montáž výztuže a předpínacích kabelů"
      - "betonování (pracovní spára obvykle v místě nulového momentu)"
      - "technologická přestávka"
      - "předepnutí konstrukce a injektáž"
      - "posun zařízení do dalšího pole"
    typical_systems_used_in_CZ:
      - MSSU      # MSSU = první v ČR po Estakáda Hvězdonice + Beroun
      - BINDER    # přemosťuje 2 pole
      - POLENSKY_ZOLLNER
    reference_projects:
      - "R 3509 Slavonín-Přáslavice (446 m, MSSU)"
      - "Estakáda Hvězdonice (první v ČR)"
      - "Estakáda Beroun"
    advantages:
      - "zrychlení výstavby (1 pole za 14 dní)"
      - "nezávislost na terénu pod mostem"
      - "možnost náročných tras + architektonických řešení"
      - "zvýšení produktivity opakováním"
    disadvantages:
      - "velké pořizovací náklady"
      - "montáž a transport skruže"
      - "komplikuje statický výpočet"
    formwork_engine_mapping: "MSS_komorovy"
    
  vysuvna_skruz_se_zatimnimi_podperami:
    label_cs: "výsuvná skruž se zatímními podpěrami"
    chapter: 14c
    construction: "4 příhradové nosníky přesouvané po zatímních podpěrách"
    advantage: "úspornější varianta díky menšímu rozpětí skruže"
    constraints:
      - "menší výšky konstrukce nad terénem"
      - "nelze navrhovat nadpilířová a mezilehlá ztužidla"
    formwork_engine_mapping: "VARIOKIT_VST_or_similar"

  vysouvane_konstrukce:
    label_cs: "vysouvané konstrukce (incremental launching)"
    label_en: "incremental launching method (ILM)"
    chapter: 15
    segment_length_m: [15, 40]  # délka lamely
    typical_section_types:
      - "jednokomorový"
      - "dvoutrám"
      - "tříkomorový"
    moment_reduction_methods:
      - id: vysuvny_nos
        label_cs: "výsuvný nos"
        type: "lehká ocelová příhradová konstrukce"
        length_pct_of_span: [60, 80]
      - id: pylon_se_zavesy
        label_cs: "montážní pylon se závěsy"
        position: "od konce konzoly ve vzdálenosti = délce vysouvaného pole"
    sliding_components:
      - "bloky s nerezavějící výztuží"
      - "teflonové desky pro posun"
      - "vodící prvky pro směr"
    formwork_construction:
      - "pevné nebo posuvné čelo"
      - "podlaha"
      - "bočnice (odklopné)"
      - "jádro (výsuvné)"
    workflow_cycle_days: 7  # pondělí předpíná, týdenní cyklus
    workflow:
      - "betonování lamely ve formě za opěrou"
      - "předepnutí po dosažení 80% pevnosti"
      - "vysunutí lamely speciální konstrukcí"
      - "betonování další lamely"
    workflow_subdivision:
      day_1_2: "betonáž spodní desky"
      day_3_4_5: "betonáž stěn a horní desky"  
      day_6_7: "tvrdnutí betonu (víkend)"
      day_8: "předpínání + výsun (pondělí)"
    sliding_mechanism_types:
      - id: tlacne
        label_cs: "tlačné"
        principle: "svislý + vodorovný hydraulický lis (nadzvedne + posune)"
      - id: tazne
        label_cs: "tažné"
        principle: "předpínací pistole + kabel zakotvený na konci lamely"
    reference_projects:
      - "Most v Tomicích (1972) — první v ČR"
      - "Most u Čekanic (1994) — 13 polí, 10 vysouvaných"
      - "Most v Římově"
      - "Most Aichtal (D B27 Stuttgart-Tübingen)"
    advantages:
