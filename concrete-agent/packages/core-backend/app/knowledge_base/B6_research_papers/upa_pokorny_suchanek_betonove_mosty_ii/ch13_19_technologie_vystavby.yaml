# ─────────────────────────────────────────────────────────────────────
# Kapitola 14: Výstavba mostů na skružích
# ─────────────────────────────────────────────────────────────────────

ch14_skruze:

  pevne_skruze:
    label_cs: "pevné skruže (lešení)"
    components: "lehké stojky podpírající bednění + nosníky"
    
    pri_3_4_polich: "skruž celá (najednou)"
    pri_dlouhých_mostech: "skruž se přestavuje"
    
    examples:
      - PEINER     # podporová skruž
      - PERI
      - HUNNEBECK
      - PIZMO_STOJKY_IP   # ocelové inventární podpěry
      - DOKA               # bednění
    
    constraints:
      max_bridge_length_m: 100
      max_height_above_ground_m_range: [10, 15]
    
    advantages:
      - "mosty složitého půdorysu / velkého spádu"
      - "případy, kdy nelze využít prefabrikaci"
      - "ocelové inventární skruže — únosnost, opakovatelnost, variabilnost, ekonomie"
    
    disadvantages:
      - "max délka mostu 100 m"
      - "max výška 10-15 m"
    page: 95

  posuvne_skruze:
    label_cs: "posuvné skruže (movable formwork system, MSS)"
    economic_for_total_length_m_min: 400
    optimum_for: "stálé rozpětí + konstantní šířka nosné konstrukce"
    can_handle_variable_section: true
    
    suitable_section_types_by_span:
      mensi_rozpeti: ["deskový", "trámový"]
      vetsi_rozpeti: ["komorový"]
    
    static_systems_during_construction:
      - "prosté nosníky"
      - "spojité nosníky"
      - "rámové konstrukce"
    
    skruz_length_to_span_ratio: [1.3, 2.5]
    
    main_girder_position:
      - id: pod_konstrukci
        bedneni: "podpíráno"
        advantage: "Prostor na skruži je volný pro veškeré práce"
      - id: nad_konstrukci
        bedneni: "zavěšeno"
        advantage: "Hlavní nosník dostatečné výšky bez omezení prostoru pod mostem"
    
    skruze_pro_segmentovou_betonaz:
      use_case: "rozpětí 60-100 m"
      max_segment_length_m: 10
      advantage: "menší hmotnost skruže"
    
    skruze_pro_cele_pole:
      use_case: "rozpětí 30-60 m"
    
    workflow_complete_pole:
      step_1: "sestavení v předpolí mostu, zasunutí do prvního pole"
      step_2: "vyrovnání bednění"
      step_3: "montáž výztuže a předpínacích kabelů"
      step_4: "betonování (pracovní spára obvykle v místě nulového momentu od vlastní tíhy)"
      step_5: "technologická přestávka"
      step_6: "předepnutí + injektáž"
      step_7: "posun zařízení do dalšího pole"
    
    workflow_segmentova:
      step_1: "sestavení zařízení na pilíři"
      step_2: "zavěšení bednění na skruži (podepírané u pilířů + na předcházející konzole)"
      step_3: "betonování od pilířů v symetrických konzolách postupně po segmentech"
    
    examples:
      - id: MSSU
        full_name: "MSSU"
        construction: "2 svařované hlavní nosníky spojené příčníky"
        front_support: "podpěrné konzoly s hydraulickými lisy upevněné na pilíři"
        rear_support: "zavěšen na nosník na hydraulických lisech (na konzole nosné konstrukce z předcházející etapy)"
        zavesy: "tyče Dywidag s klouby pro svislost při změně podélného sklonu"
      - id: BINDER
        full_name: "Posuvná skruž Binder"
        coverage: "přemosťuje 2 pole"
        movement: "podélné a příčné posuny systémem hydraulických podpěr"
      - id: POLENSKY_ZOLLNER
        full_name: "Polensky-Zöllner"
    
    reference_projects_CZ:
      - "R 3509 Slavonín-Přáslavice (446 m, MSSU)"
      - "Estakáda Hvězdonice (první v ČR)"
      - "Estakáda Beroun"
    
    static_analysis_complication:
      multi_phase: true
      example_4_pole_bridge:
        phase_1: "vlastní tíha + předpětí na staticky určitém nosníku s převislým koncem"
        phase_2_to_3: "vlastní tíha + předpětí na spojitém nosníku s převislým koncem"
        phase_4_final: "vlastní tíha + předpětí na spojitém nosníku o čtyřech polích"
    
    advantages:
      - "zrychlení výstavby (1 pole / 14 dní)"
      - "nezávislost na terénu pod mostem"
      - "možnost náročných tras a architektonických řešení"
      - "zvýšení produktivity opakováním"
    
    disadvantages:
      - "velké pořizovací náklady"
      - "montáž a transport skruže"
      - "komplikace statického výpočtu"
    page: [96, 99]

  vysuvna_skruz_se_zatimnimi_podperami:
    label_cs: "výsuvná skruž se zatímními podpěrami"
    construction: "4 příhradové nosníky"
    sliding_along: "zatímní podpěry uprostřed rozpětí, případně u pilířů"
    advantages:
      - "úspornější díky menšímu rozpětí skruže"
    disadvantages:
      - "nelze navrhovat nadpilířová a mezilehlá ztužidla"
      - "menší výšky konstrukce nad terénem"
    page: 99

# ─────────────────────────────────────────────────────────────────────
# Kapitola 15: Vysouvané konstrukce (incremental launching)
# ─────────────────────────────────────────────────────────────────────

ch15_vysouvane:

  technology: "incremental launching method (ILM)"
  segment_length_m: [15, 40]   # délka lamely
  
  prurez_vetsinou:
    primary: "jednokomorový"
    alternatives: ["deskový", "dvoutrám", "tříkomorový"]
  
  problem_konzolovy_moment:
    nature: "při vysouvání vzniká velký konzolový moment v konzole"
    reduction_methods:
      - id: vysuvny_nos
        nature: "lehká ocelová příhradová konstrukce"
        delka_pct_of_pole: [60, 80]
      - id: pylon_se_zavesy
        nature: "montážní pylon"
        position: "od konce konzoly ve vzdálenosti = délce vysouvaného pole"
    
    moment_charakter:
      max: "vždy ve vysouvané konzole"
      types: ["kladný", "záporný"]

  sliding_components:
    - "bloky s nerezavějící výztuží"
    - "teflonové desky pro posun (mezi bloky a konstrukcí)"
    - "vodící prvky pro směr (na podpěrách)"

  forma_konstrukce:
    castí: 2
    cast_1: "betonáž spodní desky"
    cast_2: "betonáž stěn + horní desky"
    bocnice: "odklopné"
    jadro: "výsuvné"
    page: 102

  workflow_basic:
    step_1: "betonování lamely ve formě za opěrou"
    step_2: "předepnutí po dosažení 80% pevnosti"
    step_3: "vysunutí lamely speciální konstrukcí"
    step_4: "betonování další lamely"
  
  workflow_weekly_cycle:
    description: "týdenní cyklus výroby"
    days_1_2: "betonáž spodní desky"
    days_3_4_5: "betonáž stěn a horní desky"
    days_6_7: "víkend — beton tvrdne"
    day_8: "pondělí — předpínání + výsun, cyklus se opakuje"

  rozdeleni_konstrukci:
    - id: vysuvny_nos
      label_cs: "pomocí výsuvného ocelového nosu"
    - id: pylon_zavesy
      label_cs: "vyvěšením ocelové části pylonem"

  vlastni_vysuvne_zarizeni:
    - id: tlacne
      label_cs: "tlačné"
      principle: "svislý + vodorovný hydraulický lis (nadzvedne + posune)"
    - id: tazne
      label_cs: "tažné"
      principle: "předpínací pistole opřená o opěru, napíná kabel zakotvený na konci lamely"

  advantages:
    - "podélné i příčné vysouvání"
  
  disadvantages:
    - "pouze mosty s konstantní křivostí"
  
  reference_projects:
    - id: tomice_1972
      name: "Most v Tomicích (1972) — první v ČR"
    - id: cekanice_1994
      name: "Most u Čekanic (1994)"
      detail: "spojitý nosník 13 polí — 10 vysouvaných + 3 monolitické"
    - id: rimov
      name: "Most v Římově"
    - id: aichtal
      name: "Most Aichtal (D B27 Stuttgart-Tübingen)"
  page: [101, 104]

