# ─────────────────────────────────────────────────────────────────────
# Kapitola 17: Letmá betonáž (balanced cantilever)
# ─────────────────────────────────────────────────────────────────────

ch17_letma_betonaz:

  technology: "balanced cantilever / free cantilever method"
  economic_for_span_min_m: 200
  typical_use_cases:
    - "mosty přes hluboká údolí"
    - "široké řeky"
    - "průplavy"
  
  staticky_system_during_construction:
    - "vetknutý"
    - "spojitý nosník"
    - "oblouk"
    - "sdružený rám s/bez kloubů uprostřed polí"
    - "jednostranná konzola"
  
  pricny_rez:
    typical: "uzavřený komůrkový průřez proměnné výšky"
    near_supports:
      bottom_slab: "zesilování"
      total_height: "zvětšení (parabolický náběh esteticky)"
    height_variation: "plynulá; alternativně konstantní s zesilněním spodní desky"
    page: 106
  
  segment_length_m: [3, 5]
  
  cantilever_moment_reduction:
    - "dočasné podpory"
    - "zavěšený pylon"
    - "postupné budování příčného řezu (snížení montážního zatížení)"
  
  workflow:
    step_1: "vybetonování zárodku (pilíř + 7-10 m nosné konstrukce, tradiční způsob)"
    step_2: "umístění 1-2 betonovacích vozíků na zárodek"
    step_3: "vyrovnání + uchycení bednění lamely"
    step_4: "uložení trubek pro kabely + výztuž"
    step_5: "betonáž úseku + 42h technologická přestávka"
    step_6: "po 42h (cca 25 MPa) — předepnutí lamely k existující konstrukci"
    step_7: "odbednění + posun vozíku (zpravidla na druhou stranu konzoly)"
    step_8: "koncové části — dobetonování na skruži"
    page: [109, 110]
  
  workflow_critical_params:
    zarodek_length_m: [7, 10]
    technologicka_prestavka_h: 42
    pevnost_pri_predepinani_MPa: 25
  
  betonovaci_vozik:
    construction: "příhradová konstrukce"
    mass_t: [50, 80]   # KRITICKÉ — vstupuje do statické analýzy
    positions:
      - nad_konstrukci
      - pod_konstrukci
    requirements:
      - "co nejnižší hmotnost"
      - "jednoduchá montáž a přesouvání"
    material_transport: "kabelové nebo sloupové jeřáby"
    page: 109
  
  kabely_kategorie:
    page: 110
    items:
      - id: montazni_konzolove
        label_cs: "montážní (konzolové) kabely"
        function: "přenesení záporných momentů během výstavby"
        location: "horní okraj desky"
      - id: kladne_zaporne
        label_cs: "kladné a záporné kabely"
        function: "redukce tahových napětí ve středu rozpětí a nad podporami"
        tensioned_when: "po vybetonování střední spáry"
      - id: spojitosti
        label_cs: "kabely spojitosti"
        function: "redukce tahových napětí + spojitost vahadel"
        span_coverage: "jedno pole"
        sub_categories:
          - id: vnitrni_soudrzne
            location: "kotvené v zesílené části u podpěr"
          - id: vnejsi_volne
            location: "kotvené v podporových příčnících"
            requirement: "vyžadují deviátory"
  
  reference_projects:
    - "Most na D8 přes Vltavu (spojitý nosník o 3 polích)"
    - "Most přes Nuselské údolí Praha (sdružený rám o 5 polích)"
    - "Zvíkovské mosty přes Otavu a Vltavu"
    - "Most přes údolí řeky Kocher (Německo)"
    - "Největší obloukový most na světě — ostrov Krk (Chorvatsko)"
  
  advantages:
    - "vhodné pro vysoké podpěry"
    - "nevyžaduje podpůrné konstrukce"
    - "neomezuje provoz pod mostem"
    - "úspora bednění"
    - "rychlá výstavba"
    - "během výstavby = staticky určitá konstrukce"
    - "lze i pro zavěšené a obloukové mosty"
  
  disadvantages:
    - "zárodek trvá několik týdnů"
    - "vysoké nároky na statický výpočet (váha vozíku 50-80 t)"
    - "reologické projevy (segmenty různého stáří)"
    - "stísněný pracovní prostor"
  page: [106, 112]

# ─────────────────────────────────────────────────────────────────────
# Kapitola 18: Prefabrikované mostní konstrukce
# ─────────────────────────────────────────────────────────────────────

ch18_prefab:

  podelne_prefab_prvky:
    label_cs: "podélné prefabrikované prvky"
    span_max_m: 40   # 30-40 m
    typical_section_types: ["U", "I", "spřažená deska s nosníkem"]
    materials:
      - zelezobetonove
      - predem_predpjate
      - dodatecne_predpjate
    erection: "autojeřáby"
    special_method:
      name: "výsuvný most"
      capability: "nosník vyzdvihnout a přesunout do místa působení (nezávislý na terénu)"
    page: 113

  pricne_delene_segmenty:
    label_cs: "příčně dělené prefabrikované segmentové konstrukce"
    segment_length_m: [2.5, 4.0]
    economic_for_span_m: ["střední", "velké"]
    typical_section_types:
      - komorovy
      - dvoutrám
      - parapetni_tramovy
    static_systems:
      - "prosté nosníky o více polích"
      - "spojité nosníky"
      - "rámové konstrukce"
      - "sdružené rámy"
      - "oblouky"
      - "zavěšené mosty"
      - "visuté mosty"
    page: 113
    
    spary_vyplneni:
      purpose: "ochrana předpínací výztuže proti korozi"
      historical:
        material: "beton"
      current:
        material: "epoxidový tmel"
        composition: "vlastní tmel + tužidlo"
        beton_today: "jen pro uzavření spáry mezi montážními celky"
      page: 113
    
    vyroba_segmentu:
      method: "kontaktní způsob"
      principle: "čelo vybetonovaného segmentu = bednění pro čelo následujícího"
      
      methods:
        - id: dlouha_draha
          label_cs: "metoda dlouhé dráhy"
          track_length: "polovina pole (geometrie odpovídá spodní hraně konstrukce)"
          procedure: "betonování segmentů na dráze do formy, která se pohybuje podél dráhy"
          advantage: "snadná kontrola geometrie"
          disadvantage: "požadavek na prostor"
          page: 114
        
        - id: kratka_draha
          label_cs: "metoda krátké dráhy"
          cell_capacity: 2  # 2 segmenty
          components: ["forma (pevné nebo pohyblivé čelo, podlaha, bočnice, jádro)", "rektifikační rámy"]
          procedure:
            step_1: "nastavení vyrobeného segmentu na rámech do navržené polohy"
            step_2: "přiražení bočnice, jádra a podlahy jako bednění dalšího segmentu"
            step_3: "betonáž"
            step_4: "odvezení kontaktního segmentu na skládku"
            step_5: "posunutí nově vyrobeného segmentu do polohy předcházejícího"
            step_6: "před montáží — nátěr kontaktní spáry epoxidovým tmelem"
            step_7: "montáž segmentů"
          advantage: "možnost segmentů přímých i výrazně zakřivených"
          disadvantage: "nutno sledovat hydratační teplo"
          page: 115
      
      proteplovani:
        purpose: "zmenšení smršťování a dotvarování"
        risk: "deformace stykové plochy vyráběných segmentů"
    
    osetrovani:
      after_casting: "kropení po 24 hodinách"
      after_form_removal: "vlhčení povrchu"
      until_strength_pct: 70
      page: 115
    
    skladovani:
      max_layers: 2
      base: "podlážky"
    
    doprava_segmentu:
      methods: ["železnice", "silnice", "lodě"]
    
    montaz_metody:
      - id: letmo_obe_strany_pilire
        label_cs: "montáž letmo na obě strany pilíře"
        is_most_common: true
        for_span: ["střední", "velké"]
        workflow: "zárodek → symetrické připojení segmentů → dobetonování střední části → zmonolitnění předepnutím"
        page: 116
      
      - id: kratsi_zavazeci_most
        label_cs: "montáž kratším zavážecím mostem"
        bridge_to_span_ratio: 1.5
      
      - id: delsi_zavazeci_most
        label_cs: "montáž delším zavážecím mostem"
        bridge_to_span_ratio: 2.0
        feature: "všechny 3 nohy nad pilíři + 2 zvedací zařízení"
        advantage: "urychlení montáže"
      
      - id: kolovy_jerab_uzaviraci_most
        label_cs: "kolový jeřáb a uzavírací most"
        principle: "uzavírací most = (podepřený konec hotové části + následující pilíř); autojeřáb na konzole vahadla"
        advantage: "segmenty nezatěžují konstrukci v průběhu výstavby"
        disadvantage: "výška mostu omezena zdvihem autojeřábu a uzavíracího mostu"
      
      - id: jerab_pojezd_konstrukce
        label_cs: "jeřáb pojíždějící po konstrukci"
        principle: "vozík (jeřáb) na zárodek; symetrická montáž = vahadlo; vozíky kotveny při zdvihání"
        advantage: "2 vozíky urychlí výstavbu"
        disadvantage: "výška mostu omezena zdvihem vozíku"
      
      - id: vpred_estakada_25_50m
        label_cs: "montáž vpřed (estakády L=25-50 m)"
        movement_direction: "jedním směrem od pilíře"
        sub_methods:
          - "podpírání konzoly provizorními podpěrami"
          - "vyvěšování konzoly pomocí pylonu + lana"
        page: 117
      
      - id: vpred_kolovy_jerab
        label_cs: "montáž vpřed kolovými mobilními jeřáby"
        constraint: "dobrý přístup k mostu"
    
    fazi_pripojeni:
      page: 115
      items:
        - id: provizorni
          label_cs: "montážní (provizorní) připnutí segmentu"
          common_method: "předpínací tyče kotvené do stoliček (kozlíků) nahoře a dole"
        - id: definitivni
          label_cs: "definitivní připnutí segmentu"
    
    geometrie_kontrola:
      frequency: "pravidelně v průběhu montáže"
      odchylky: "včas eliminovány"
      vpred_montaz: "návrh prostorových spár pro vyrovnání délkových změn"
    
    reference_projects:
      - "Zavěšený most přes Labe u Poděbrad"
      - "Most přes Radbuzu u Plzně"

