# ─────────────────────────────────────────────────────────────────────
# Kapitola 7: Předpínací systémy — základní rozdělení
# ─────────────────────────────────────────────────────────────────────

ch07_zakladni_typy:
  
  predem_predpjate:
    label_cs: "předem předpjaté"
    label_en: "pre-tensioned"
    bond: "se soudržností"
    typical_use: "prefabrikované mostní konstrukce"
    predpinaci_drahy_max_length_m: 200
    workflow:
      step_1: "očištění + namazání odformovacím olejem"
      step_2: "vložení betonářské + předpínací výztuže"
      step_3: "napínání hydraulickou pistolí + kotvení do kotevních bloků"
      step_4: "betonáž, vibrace, hlazení"
      step_5: "proteplení betonu (urychlení tvrdnutí)"
      step_6: "po dosažení 80% pevnosti uvolnit kotvení → vnesení předpětí"
    workflow_critical_param:
      pevnost_betonu_pred_uvolnenim_pct: 80
    products:
      - VSTI-2000
      - I-DZ_97
      - TT-DZ_97
      - MK-T
    page: 62

  dodatecne_predpjate:
    label_cs: "dodatečně předpjaté"
    label_en: "post-tensioned"
    bond: "se soudržností i bez soudržnosti"
    typical_use: "mosty na rozpětí střední a velké"
    workflow:
      step_1: "osazení kabelových kanálků ve formě (s odvzdušňovacími trubkami v nejvyšších bodech)"
      step_2: "vybednění čel + osazení kotev"
      step_3: "doplnění předpínací výztuže betonářskou"
      step_4: "vložení kabelů s mrtvými kotvami do trubek před betonáží"
      step_5: "vybetonování (v plné délce nebo z dílů)"
      step_6: "protažení patentovaného kabelu chráničkou"
      step_7: "předepnutí kabelu (převážně ve výrobně, případně další na stavbě)"
      step_8: "profouknutí kanálků stlačeným vzduchem nebo tlakovou vodou"
      step_9: "zainjektování"
    products_current:
      - "MK-T"
      - "MK-T-ČD"
      - "T-93"
      - "T-2000_PETRA"
    products_legacy_pre_1990:
      - "KA-67"
      - "KA-73"
      - "I-67"
      - "I-73"
    page: 63

  vnejsi_predpeti:
    label_cs: "vnější volné předpětí"
    label_en: "external prestressing"
    bond: "bez soudržnosti"
    common_form: "vícelanové kabely vedené mimo betonový průřez pomocí deviátorů"
    typical_location: "v dutině komorového průřezu"
    components:
      deviatory:
        definition: "masivní bloky betonu nebo ocelové prvky, v nichž dochází k vychýlení dráhy předpínacího kabelu"
      kotevni_bloky: true
      sedla: true
    arrangements:
      - "ohýbání vnějších kabelů v deviátorech"
      - "ohýbání vnějších kabelů v příčnících"
      - "volná lana vedená přes pylon (zavěšené mosty)"
    page: 65

