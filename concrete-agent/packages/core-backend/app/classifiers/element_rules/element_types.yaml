# Element-classification rule-data — single source of truth (TASK_2b, Gate 1)
# ============================================================================
# Sibling of app/classifiers/rules/ (the January work-group classifier — a
# DIFFERENT axis, untouched). This file types a position into a STRUCTURAL
# ELEMENT (dřík pilíře / opěra / mostovka …), not into a work group.
#
# Two consumers, one source:
#   - Python W3 side reads THIS yaml directly.
#   - The TS engine imports the generated artifact
#     Monolit-Planner/shared/src/kb-generated/element-classification-rules.ts
#     (regenerate + drift-check: `npm run gen:element-rules[:check]`).
#
# Schema (borrowed include/exclude/boost/priority_over shape from the January
# rule schema; the HEAD-NOUN decision is NOT here — it is code, per TASK_2b):
#
#   type_core            language-neutral element ontology (concept ids)
#   bridge_remap         neutral type→type upgrade in real bridge context
#   object_type_aliases  token → bridge | retaining_wall | building
#   dictionaries.<lang>  per-language word lists:
#       keywords.<type>  include / exclude / boost_units / priority
#       status_markers   existing/demolition wording → status "stávající"
#       tail_markers     prepositional/participle tail cut (head-noun input)
#       bridge_vocab     real bridge context words (NOT a bare SO-number)
#       wall_vocab       retaining/abutment WALL context words
#
# Adding a language = add dictionaries.<lang> (+ head-noun rules for it in
# code). NEVER edit type_core for a new language.
#
# Gate 1 scope: this data + the generator + a CI-blocking drift-check exist as
# the single source. Live classifiers are NOT yet rewired to read it — that
# migration happens in Gate 2 (head-noun layer) and Gate 4 (dřík suppression),
# each under the W3-parity golden controls so behavior is preserved.

version: "1.0.0"
updated: "2026-06-05"

# ── type_core — language-neutral ontology ───────────────────────────────────
# orientation: horizontal | vertical | special
# family: bridge | building | both | special | reject
# bridge_remap: when set, this (building) type upgrades to the target in a real
#   bridge context. w3_name: the equivalent W3 (Python) classifier type id.
type_core:
  # ─ bridge ─
  zaklady_piliru:       { orientation: vertical,   family: bridge,   w3_name: zaklady_piliru }
  zaklady_oper:         { orientation: vertical,   family: bridge,   w3_name: zaklady_piliru }
  driky_piliru:         { orientation: vertical,   family: bridge,   w3_name: driky_piliru }
  rimsa:                { orientation: horizontal, family: bridge,   w3_name: rimsa }
  operne_zdi:           { orientation: vertical,   family: both,     w3_name: operna_zed }
  mostovkova_deska:     { orientation: horizontal, family: bridge,   w3_name: mostovkova_deska }
  rigel:                { orientation: vertical,   family: bridge,   w3_name: pricinik }
  opery_ulozne_prahy:   { orientation: vertical,   family: bridge,   w3_name: opery_ulozne_prahy }
  kridla_opery:         { orientation: vertical,   family: bridge,   w3_name: kridla_opery }
  mostni_zavirne_zidky: { orientation: vertical,   family: bridge,   w3_name: opery_ulozne_prahy }
  prechodova_deska:     { orientation: horizontal, family: bridge,   w3_name: prechodova_deska }
  podkladni_beton:      { orientation: horizontal, family: special,  w3_name: jine }
  podlozkovy_blok:      { orientation: horizontal, family: bridge,   w3_name: jine }
  # ─ building ─
  zakladova_deska:      { orientation: horizontal, family: building, w3_name: zakladova_deska, bridge_remap: zaklady_piliru }
  zakladovy_pas:        { orientation: vertical,   family: building, w3_name: zaklady,         bridge_remap: zaklady_piliru }
  zakladova_patka:      { orientation: vertical,   family: building, w3_name: zaklady_piliru,  bridge_remap: zaklady_piliru }
  stropni_deska:        { orientation: horizontal, family: building, w3_name: deska,           bridge_remap: mostovkova_deska }
  stena:                { orientation: vertical,   family: building, w3_name: stena,           bridge_remap: operne_zdi }
  sloup:                { orientation: vertical,   family: building, w3_name: sloup,           bridge_remap: driky_piliru }
  pruvlak:              { orientation: horizontal, family: building, w3_name: pruvlak,         bridge_remap: rigel }
  schodiste:            { orientation: horizontal, family: building, w3_name: schodiste }
  nadrz:                { orientation: vertical,   family: building, w3_name: nadrz }
  podzemni_stena:       { orientation: vertical,   family: building, w3_name: stena }
  pilota:               { orientation: vertical,   family: both,     w3_name: pilota }
  # ─ residual ─
  other:                { orientation: vertical,   family: special,  w3_name: jine }
  # ─ explicit reject (NOT a concrete structural element) — materialized in Gate 3 ─
  zdivo_obklad:         { orientation: vertical,   family: reject,   w3_name: zdivo_obklad }

# ── bridge_remap — neutral type→type in real bridge context ─────────────────
# (mirrors the engine BRIDGE_EQUIVALENT table; also derivable from type_core.bridge_remap)
bridge_remap:
  sloup: driky_piliru
  zakladova_deska: zaklady_piliru
  zakladovy_pas: zaklady_piliru
  zakladova_patka: zaklady_piliru
  stropni_deska: mostovkova_deska
  pruvlak: rigel
  stena: operne_zdi

# ── object_type_aliases — authoritative construction context ────────────────
# (mirrors W3 _OBJECT_TYPE_ALIASES)
object_type_aliases:
  bridge: bridge
  most: bridge
  retaining_wall: retaining_wall
  zarubni_zed: retaining_wall
  operna_zed: retaining_wall
  zed: retaining_wall
  building: building
  budova: building
  pozemni: building

# ── dictionaries ────────────────────────────────────────────────────────────
# cs filled now. sk/de/… = future siblings under this key (structure only).
# keyword include lists are transcribed FAITHFULLY from the engine's current
# KEYWORD_RULES (element-classifier.ts) so the Gate-2/4 consumer migration is
# behavior-preserving. Multilingual entries (ru) are kept where the engine has
# them. `reject_*` lists carry the early-exit / not-a-concrete-element vocab.
dictionaries:
  cs:
    keywords:
      mostovkova_deska:
        priority: 10
        include: [mostovka, mostovkov, mostova deska, mostní deska, mostni deska,
          deska mostu, nosna konstrukce, nosná konstrukce, bridge deck,
          nosne tram, nosné trám, nosna konstr, nosná konstr,
          predpj bet, předpj bet, predpjat, předpjat,
          nosnik most, nosník most, podelny nosnik, podélný nosník,
          mostni svrsek, mostní svršek, superstructure,
          hlavni nosnik, hlavní nosník, komorovy nosnik, komorový nosník,
          deska nosne, deska nosné, nosna deska, nosná deska,
          мостов, мостовая плита, пролетное строение]
      rimsa:
        priority: 10
        include: [rimsa, říms, rimsov, rimsova deska, římsová deska,
          zabradeln zid, zábradelní zíd, zabradel, zábradel,
          parapet, cornice, coping, римс, карниз]
      prechodova_deska:
        priority: 11
        include: [prechodova deska, přechodová deska, prechodove desky, přechodové desky,
          prechodov, přechodov, transition slab, approach slab]
      mostni_zavirne_zidky:
        priority: 9
        include: [zavirn, závěrn, zavirne zidky, závěrné zídky,
          zidka most, zídka most, closure wall, end wall]
      rigel:
        priority: 9
        include: [pricnik, příčník, pricni, příčn, pricnik most, příčník most,
          rigel, ригель, hlavice pilir, hlavice pilíř, hlavic,
          pier cap, crossbeam, diafragm, diaphragm]
      zaklady_piliru:
        priority: 10
        include: [zaklad pilir, základ pilíř, zaklady piliru, základy pilířů,
          zaklady, základy, pilotov zaklad, pilotový základ,
          zakladovy blok, základový blok, blok oper, blok opěr,
          plosny zaklad most, plošný základ most,
          фундамент опор, фундамент пилон]
      zaklady_oper:
        priority: 11
        include: [zaklad oper, základ opěr, zaklady oper, základy opěr,
          opera zaklad, opěra základ, opery zaklad, opěry základ,
          mostni opera zaklad, mostní opěra základ,
          zaklad mostni opery, základ mostní opěry]
      driky_piliru:
        priority: 8
        # NOTE: 'telo oper'/'tělo opěr' (abutment body) is intentionally LEFT
        # here for Gate-1 faithfulness; Gate 4 removes it + adds the dřík/opěra
        # suppression rule (this is the bug, preserved for now).
        include: [drik, dřík, driky pilir, dříky pilíř, pilir most, pilíř most,
          mostni pilir, mostní pilíř, mostni pilire, mostní pilíře,
          stativ, stativa, telo pilir, tělo pilíř, telo oper, tělo opěr,
          pier stem, pier shaft, pylon, тело опор, столб моста]
      operne_zdi:
        priority: 8
        include: [opern, opěrn, operna zed, opěrná zeď, operne zdi most, opěrné zdi most,
          zarubn, zárubn, zarubni zed, zárubní zeď, kotven zed, kotvená zeď,
          gabionov, gabion, retaining wall, подпорн стен]
      kridla_opery:
        priority: 9
        include: [kridl, křídl, kridla, křídla, křídlo,
          wing wall, mostni kridl, mostní křídl]
      opery_ulozne_prahy:
        priority: 7
        include: [opera, opěra, opery, opěry, ulozn, úložn, ulozne prah, úložné prah,
          prah, sedlo, mostni oper, mostní opěr, mostni opery, mostní opěry,
          abutment, bearing seat]
      stropni_deska:
        priority: 7
        include: [stropni, stropní, strop, podlah, podlažní, floor slab,
          перекрыт, плита перекрыт, монолитн перекрыт]
      zakladova_deska:
        priority: 9
        include: [zakladova deska, základová deska, zakladni deska, základní deska,
          foundation slab, фундаментн плит, фундаментн деск]
      zakladovy_pas:
        priority: 9
        include: [zakladovy pas, základový pás, zakladove pasy, základové pásy,
          zaklady, základy, strip found, ленточн фундамент]
      zakladova_patka:
        priority: 8
        include: [patka, patky, zakladova patka, základová patka, pad found,
          столбчат фундамент]
      stena:
        priority: 6
        include: [stena, stěna, zed, zeď, jadro, jádro, core wall, shear wall,
          стена, монолитн стен, ядро жесткости]
      sloup:
        priority: 6
        include: [sloup, pilir, pilíř, column, pillar, колонн, столб, пилон]
      pruvlak:
        priority: 6
        include: [pruvlak, průvlak, tram, trám, beam, girder, preklad, překlad,
          nosnik, nosník, балк, прогон, ригель здан]
      schodiste:
        priority: 8
        include: [schodist, schodiště, schody, staircase, stairs, stupne, stupně, лестниц]
      nadrz:
        priority: 8
        include: [nadrz, nádrž, jimka, jímka, bazen, bazén, nadoba, nádoba,
          tank, reservoir, pool, vodojem, резервуар, ёмкость, бассейн, отстойник]
      podzemni_stena:
        priority: 9
        include: [podzemni stena, podzemní stěna, milansk, milánsk, diaphragm wall,
          стена в грунт, милан]
      pilota:
        priority: 8
        include: [pilota, piloty, mikropilot, vrtana pilota, vrtaná pilota, bored pile,
          свая, буронабивн]
      podkladni_beton:
        priority: 7
        exclude: [zelezobet, zelezobeton, vyztuz, armovan]
        include: [podkladni beton, podkladní beton, podklad beton, podbet,
          lean concrete, blinding, podkladni a vyplnove, podkladní a výplňové,
          vyplnove vrstvy, výplňové vrstvy, podkl vrst]
      podlozkovy_blok:
        priority: 9
        include: [podlozkovy blok, podložiskový blok, podlozisk, podložisk,
          bearing block, bearing pad, loziskovy blok, ložiskový blok,
          blok pod lozisko, blok pod ložisko]
      # ─ reject family (W3 zdivo_obklad — masonry/cladding, not concrete) ─
      zdivo_obklad:
        priority: 10
        include: [licovy obklad, lícový obklad, licove zdivo, lícové zdivo,
          obklad z lomoveho kamene, obklad lomovym kamenem, kamenne zdivo,
          kamenné zdivo, lomovy kamen, lomový kámen]

    # ─ head-noun layer inputs (consumed by the Gate-2 algorithm, not a table) ─
    status_markers: [stávajíc, demol, bourán, odstran, původní, "stav.", odbour]
    tail_markers: [" z ", " ze ", kotven, obložen, obložen, vlepen, "pro založen", "na líci", "do dříku"]
    bridge_vocab: [most, přemost, lávk, mostovk, nosná konstr, nosna konstr, "NK",
      pilíř, pilir, opěr, oper, estakád, "silnič most"]
    wall_vocab: [zárubní, zarubni, opěrná zeď, operna zed, úhlov, uhlov, tížn, tizn,
      gabion, opěrná konstr, operna konstr]

    # ─ early-exit / not-a-concrete-element vocab (Gate-3 reject routing) ─
    reject_materials: [strikan, stříkan, torkret, nastrik, nástřik,
      "izolacn vrst", "izolační vrst", "zalivk spar", "zálivk spár", zalivkov,
      zálivkov, "monolitick vozovk", "betonov vozovk", betonový kryt]
